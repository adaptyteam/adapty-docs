name: Translate docs

on:
  push:
    branches: [main]
    paths:
      - 'src/content/docs/**'
      - 'src/components/reusable/**'
      - 'src/data/sidebars/**'
      - 'src/api-reference/specs/*.yaml'
      - 'src/locales/dictionary.json'

# Queue concurrent runs (do not cancel) so an in-flight Anthropic batch isn't
# killed mid-call and two pushes don't race on the translation commit.
concurrency:
  group: translate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need parent commit to compute the diff
          fetch-depth: 2

      # Hashes are gitignored but must persist between runs so --incremental
      # only re-translates sections that actually changed within a file.
      # We split restore and save so each run writes a fresh entry (keyed by
      # run_id) while restoring from the most recent previous entry. Previous
      # approach used github.sha, which was functionally similar but produced
      # one entry per commit — accelerating eviction from the 10 GB repo
      # cache budget. Bump the -v1 suffix to force a cold rebuild.
      - name: Restore translation hash cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: src/locales/*/.hashes
          key: translation-hashes-v1-${{ github.run_id }}
          restore-keys: translation-hashes-v1-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'

      # Split the diff into added/modified files (to translate) and deleted files (to clean up).
      - name: Get changed translatable files
        id: diff
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AMR HEAD^1 HEAD \
            | grep -E '^(src/content/docs/.+\.mdx|src/components/reusable/.+\.mdx?|src/data/sidebars/.+\.json|src/api-reference/specs/[^./]+\.yaml)$' \
            | tr '\n' ',' | sed 's/,$//')
          DELETED=$(git diff --name-only --diff-filter=D HEAD^1 HEAD \
            | grep -E '^(src/content/docs/.+\.mdx|src/components/reusable/.+\.mdx?|src/api-reference/specs/[^./]+\.yaml)$' \
            | tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT

      - name: Translate changed files
        if: steps.diff.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/translate.mjs --incremental --only-files "${{ steps.diff.outputs.files }}"

      # Save the updated hash cache after translation so the next run can skip
      # unchanged sections. Runs even when later steps fail (e.g. commit/push),
      # as long as translation produced hashes, so we don't lose progress.
      - name: Save translation hash cache
        if: always() && steps.diff.outputs.files != ''
        uses: actions/cache/save@v4
        with:
          path: src/locales/*/.hashes
          key: translation-hashes-v1-${{ github.run_id }}

      # Remove translated files and hash caches for deleted source content.
      # Sidebars are intentionally excluded: deleting a sidebar JSON is rare and
      # rebuildSidebarLabels will naturally omit it on the next sidebar update.
      - name: Clean up deleted translations
        if: steps.diff.outputs.deleted != ''
        run: |
          for SRC_PATH in $(echo "${{ steps.diff.outputs.deleted }}" | tr ',' '\n'); do
            BASENAME=$(basename "$SRC_PATH")
            EXT="${BASENAME##*.}"
            NAME="${BASENAME%.*}"
            for LOCALE_DIR in src/locales/*/; do
              if [[ "$SRC_PATH" == src/components/reusable/* ]]; then
                rm -f "${LOCALE_DIR}reusable/${BASENAME}"
                rm -f "${LOCALE_DIR}.hashes/reusable/${NAME}.json"
              elif [ "$EXT" = "mdx" ]; then
                rm -f "${LOCALE_DIR}${NAME}.mdx"
                rm -f "${LOCALE_DIR}.hashes/${NAME}.json"
              elif [ "$EXT" = "yaml" ]; then
                # Remove all localized variants: adapty-api.zh.yaml, etc.
                rm -f src/api-reference/specs/${NAME}.*.yaml
                rm -f "${LOCALE_DIR}.hashes/api-specs/${NAME}.json"
              fi
            done
          done

      # Commit any new or updated locale files back to main.
      # This push triggers s3-deploy-production.yml, so the deploy that follows
      # will include the freshly translated content.
      - name: Commit updated translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/locales/
          if git diff --staged --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "chore: update translations"
            git push
          fi
