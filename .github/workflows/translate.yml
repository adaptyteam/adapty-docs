name: Translate docs

on:
  push:
    branches: [main]
    paths:
      - "src/content/docs/**"
      - "src/components/reusable/**"
      - "src/data/sidebars/**"
      - "src/api-reference/specs/*.yaml"
      - "src/locales/dictionary.json"
  # Manual trigger for replaying a wider diff (e.g. recovering from a failed
  # CI translate run that used a buggy script version). Always uses the latest
  # script from the dispatched ref; computes the diff against `base_sha`.
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Base SHA to diff against (e.g. last good commit before the merge that needs re-translating). Leave blank to use HEAD^1."
        required: false
        default: ""

# Queue concurrent runs (do not cancel) so an in-flight Anthropic batch isn't
# killed mid-call and two pushes don't race on the translation commit.
concurrency:
  group: translate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Compute the diff once and discover locales dynamically so the translate
  # matrix doesn't need a hardcoded list. Adding a new locale only requires
  # creating its `src/locales/<code>/` directory (handled by the localize
  # skill) — no workflow edits.
  setup:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.files }}
      deleted: ${{ steps.diff.outputs.deleted }}
      locales: ${{ steps.locales.outputs.list }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Push: parent commit suffices. Dispatch: may target an older commit,
          # so fetch full history. Inverted from the obvious form because
          # `0 || 2` evaluates to `2` in GH expressions (0 is falsy).
          fetch-depth: ${{ github.event_name == 'push' && 2 || 0 }}

      - name: Get changed translatable files
        id: diff
        run: |
          # Resolve the base ref for diffing.
          # - Push: HEAD^1 (the parent commit).
          # - Manual dispatch: the user-supplied base SHA, or HEAD^1 if blank.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.base_sha }}" ]; then
            BASE="${{ github.event.inputs.base_sha }}"
          else
            BASE="HEAD^1"
          fi
          echo "Diffing $BASE..HEAD"
          CHANGED=$(git diff --name-only --diff-filter=AMR "$BASE" HEAD \
            | grep -E '^(src/content/docs/.+\.mdx|src/components/reusable/.+\.mdx?|src/data/sidebars/.+\.json|src/api-reference/specs/[^./]+\.yaml)$' \
            | tr '\n' ',' | sed 's/,$//')
          DELETED=$(git diff --name-only --diff-filter=D "$BASE" HEAD \
            | grep -E '^(src/content/docs/.+\.mdx|src/components/reusable/.+\.mdx?|src/api-reference/specs/[^./]+\.yaml)$' \
            | tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT

      # Discover locales by listing subdirectories of src/locales/. Matches the
      # logic in `discoverLocales()` in scripts/translate.mjs so the workflow
      # processes the same set the script would default to.
      - name: Discover locales
        id: locales
        run: |
          LOCALES=$(ls -d src/locales/*/ 2>/dev/null | xargs -n1 basename | jq -R . | jq -sc .)
          echo "list=$LOCALES" >> $GITHUB_OUTPUT
          echo "Detected locales: $LOCALES"

  # One job per locale, all running in parallel. fail-fast: false lets the
  # other locales finish even if one hits a transient Anthropic error, so a
  # single flaky batch doesn't block the others' commits.
  translate:
    needs: setup
    if: needs.setup.outputs.changed != ''
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        locale: ${{ fromJson(needs.setup.outputs.locales) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"

      - name: Translate changed files for ${{ matrix.locale }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/translate.mjs --lang ${{ matrix.locale }} --incremental --batch --only-files "${{ needs.setup.outputs.changed }}"

      # Upload the locale's full state on success — the apply job consumes
      # these to assemble the final commit. include-hidden-files preserves
      # the `.hashes/` subdirectory the script uses for change detection.
      - name: Upload translated locale
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: locale-${{ matrix.locale }}
          path: src/locales/${{ matrix.locale }}/
          include-hidden-files: true
          retention-days: 1

      # On failure, preserve the locale's state under a distinct artifact name
      # so the operator can recover translations without paying for another
      # Claude batch. Distinct from the success artifact so the apply job
      # won't pick this up.
      - name: Upload locale state on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-${{ matrix.locale }}-${{ github.run_id }}
          path: src/locales/${{ matrix.locale }}/
          include-hidden-files: true
          retention-days: 30

  # Aggregate successful per-locale artifacts, clean up deleted sources,
  # lint, and commit once. Runs even if some matrix entries failed (so a
  # flaky locale doesn't block the others from shipping), and also runs in
  # the delete-only case (no `changed` files but `deleted` is non-empty).
  apply:
    needs: [setup, translate]
    if: |
      always()
      && needs.setup.result == 'success'
      && needs.translate.result != 'cancelled'
      && (needs.setup.outputs.changed != '' || needs.setup.outputs.deleted != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"

      # Pull every successful per-locale artifact. Each artifact extracts to
      # its own subdirectory matching the artifact name (e.g. `locale-zh/`).
      # Missing artifacts (failed matrix entries) are silently skipped.
      - name: Download translated locales
        if: needs.setup.outputs.changed != ''
        uses: actions/download-artifact@v4
        with:
          path: /tmp/translated/
          pattern: locale-*

      # Replace each locale's checked-out state with the artifact's contents.
      # rsync --delete ensures the locale dir exactly matches what the
      # translate script wrote (any files removed during translation, e.g.
      # rare hash-cache rewrites, are dropped too). `cp -a` on the trailing
      # `/.` is used over rsync to avoid an extra apt step on the runner.
      - name: Apply translated locales
        if: needs.setup.outputs.changed != ''
        run: |
          shopt -s nullglob
          for dir in /tmp/translated/locale-*/; do
            locale=$(basename "$dir" | sed 's/^locale-//')
            mkdir -p "src/locales/$locale"
            # Remove existing locale contents (including hidden .hashes/), then
            # copy the artifact's full state in. The `/.` source syntax copies
            # directory contents (including dotfiles) instead of the directory
            # itself.
            rm -rf "src/locales/$locale"/* "src/locales/$locale"/.[!.]*
            cp -a "$dir"/. "src/locales/$locale/"
          done

      # Remove translated files and hash caches for deleted source content.
      # Sidebars are intentionally excluded: deleting a sidebar JSON is rare
      # and rebuildSidebarLabels will naturally omit it on the next sidebar
      # update.
      - name: Clean up deleted translations
        if: needs.setup.outputs.deleted != ''
        run: |
          for SRC_PATH in $(echo "${{ needs.setup.outputs.deleted }}" | tr ',' '\n'); do
            BASENAME=$(basename "$SRC_PATH")
            EXT="${BASENAME##*.}"
            NAME="${BASENAME%.*}"
            for LOCALE_DIR in src/locales/*/; do
              if [[ "$SRC_PATH" == src/components/reusable/* ]]; then
                rm -f "${LOCALE_DIR}reusable/${BASENAME}"
                rm -f "${LOCALE_DIR}.hashes/reusable/${NAME}.json"
              elif [ "$EXT" = "mdx" ]; then
                rm -f "${LOCALE_DIR}${NAME}.mdx"
                rm -f "${LOCALE_DIR}.hashes/${NAME}.json"
              elif [ "$EXT" = "yaml" ]; then
                # Remove all localized variants: adapty-api.zh.yaml, etc.
                rm -f src/api-reference/specs/${NAME}.*.yaml
                rm -f "${LOCALE_DIR}.hashes/api-specs/${NAME}.json"
              fi
            done
          done

      # Static-check the freshly written translations before committing them.
      # --fix auto-repairs rules that are mechanically safe (blank-line). If
      # lint exits non-zero, unfixable issues remain — the workflow stops
      # here without committing. The aggregated upload step below preserves
      # the runner's state as an artifact so the operator can recover.
      - name: Lint translated MDX
        run: node scripts/lint-mdx.mjs --fix

      # Commit any new or updated locale files back to main. This push
      # triggers s3-deploy-production.yml, so the deploy that follows will
      # include the freshly translated content.
      - name: Commit updated translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/locales/
          if git diff --staged --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "chore: update translations"
            git push
          fi

      # If lint or commit failed, preserve the aggregated locale state for
      # manual recovery. The per-locale `failed-*` artifacts from the matrix
      # also remain (uploaded on translate failure) — together they cover
      # both upstream and downstream failure modes.
      - name: Upload aggregated state on failure
        if: failure() && needs.setup.outputs.changed != ''
        uses: actions/upload-artifact@v4
        with:
          name: apply-failed-${{ github.run_id }}
          path: src/locales/
          include-hidden-files: true
          retention-days: 30
