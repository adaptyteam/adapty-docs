name: Translate docs

on:
  push:
    branches: [main]
    paths:
      - "src/content/docs/**"
      - "src/components/reusable/**"
      - "src/data/sidebars/**"
      - "src/api-reference/specs/*.yaml"
      - "src/locales/dictionary.json"
  # Manual trigger for replaying a wider diff (e.g. recovering from a failed
  # CI translate run that used a buggy script version). Always uses the latest
  # script from the dispatched ref; computes the diff against `base_sha`.
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Base SHA to diff against (e.g. last good commit before the merge that needs re-translating). Leave blank to use HEAD^1."
        required: false
        default: ""

# Queue concurrent runs (do not cancel) so an in-flight Anthropic batch isn't
# killed mid-call and two pushes don't race on the translation commit.
concurrency:
  group: translate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need history deep enough to diff against the requested base.
          # Push: parent commit suffices. Dispatch: may target an older commit,
          # so fetch full history. Condition is inverted from the obvious form
          # because `0 || 2` evaluates to `2` in GH expressions (0 is falsy).
          fetch-depth: ${{ github.event_name == 'push' && 2 || 0 }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"

      # Split the diff into added/modified files (to translate) and deleted files (to clean up).
      - name: Get changed translatable files
        id: diff
        run: |
          # Resolve the base ref for diffing.
          # - Push: HEAD^1 (the parent commit).
          # - Manual dispatch: the user-supplied base SHA, or HEAD^1 if blank.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.base_sha }}" ]; then
            BASE="${{ github.event.inputs.base_sha }}"
          else
            BASE="HEAD^1"
          fi
          echo "Diffing $BASE..HEAD"
          CHANGED=$(git diff --name-only --diff-filter=AMR "$BASE" HEAD \
            | grep -E '^(src/content/docs/.+\.mdx|src/components/reusable/.+\.mdx?|src/data/sidebars/.+\.json|src/api-reference/specs/[^./]+\.yaml)$' \
            | tr '\n' ',' | sed 's/,$//')
          DELETED=$(git diff --name-only --diff-filter=D "$BASE" HEAD \
            | grep -E '^(src/content/docs/.+\.mdx|src/components/reusable/.+\.mdx?|src/api-reference/specs/[^./]+\.yaml)$' \
            | tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT

      - name: Translate changed files
        if: steps.diff.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/translate.mjs --incremental --batch --only-files "${{ steps.diff.outputs.files }}"

      # Remove translated files and hash caches for deleted source content.
      # Sidebars are intentionally excluded: deleting a sidebar JSON is rare and
      # rebuildSidebarLabels will naturally omit it on the next sidebar update.
      - name: Clean up deleted translations
        if: steps.diff.outputs.deleted != ''
        run: |
          for SRC_PATH in $(echo "${{ steps.diff.outputs.deleted }}" | tr ',' '\n'); do
            BASENAME=$(basename "$SRC_PATH")
            EXT="${BASENAME##*.}"
            NAME="${BASENAME%.*}"
            for LOCALE_DIR in src/locales/*/; do
              if [[ "$SRC_PATH" == src/components/reusable/* ]]; then
                rm -f "${LOCALE_DIR}reusable/${BASENAME}"
                rm -f "${LOCALE_DIR}.hashes/reusable/${NAME}.json"
              elif [ "$EXT" = "mdx" ]; then
                rm -f "${LOCALE_DIR}${NAME}.mdx"
                rm -f "${LOCALE_DIR}.hashes/${NAME}.json"
              elif [ "$EXT" = "yaml" ]; then
                # Remove all localized variants: adapty-api.zh.yaml, etc.
                rm -f src/api-reference/specs/${NAME}.*.yaml
                rm -f "${LOCALE_DIR}.hashes/api-specs/${NAME}.json"
              fi
            done
          done

      # Static-check the freshly written translations before committing them.
      # --fix auto-repairs rules that are mechanically safe (blank-line).
      # If lint exits non-zero, unfixable issues remain — the workflow stops
      # here without committing. The Upload step below preserves the runner's
      # locale state as an artifact so the operator can recover the
      # translations without paying for another Claude batch.
      - name: Lint translated MDX
        run: node scripts/lint-mdx.mjs --fix

      # Commit any new or updated locale files back to main.
      # This push triggers s3-deploy-production.yml, so the deploy that follows
      # will include the freshly translated content.
      - name: Commit updated translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/locales/
          if git diff --staged --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "chore: update translations"
            git push
          fi

      # If anything after translation failed (typically: lint can't auto-fix
      # something, or the commit/push step errored), preserve the runner's
      # locale state so the translations aren't lost when the runner is
      # destroyed. Download from the run's Artifacts section, repair locally,
      # commit + push.
      - name: Upload translated files on failure
        if: failure() && steps.diff.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: failed-translations-${{ github.run_id }}
          path: src/locales/
          retention-days: 30
