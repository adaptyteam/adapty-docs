          type: number
          format: float
          description: 价格值
      required:
        - country
        - currency
        - value

    OfferDTO:
      type: object
      properties:
        category:
          type: string
          enum: [introductory, promotional, offer_code, win_back]
          description: 优惠类别
        type:
          type: string
          enum: [free_trial, pay_as_you_go, pay_up_front]
          description: 优惠类型
        id:
          type: string
          nullable: true
          description: 优惠 ID
      required:
        - category
        - type

    GrantAccessRequest:
      type: object
      properties:
        access_level_id:
          type: string
          description: 在访问等级页面中配置的付费访问等级 ID
        starts_at:
          type: string
          format: date-time
          nullable: true
          description: 访问等级生效的日期时间。可以是未来时间。默认值为 null。
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 访问等级到期的日期时间。可以是过去时间，也可以为 null（表示永久授权）。默认值为 null。
      required:
        - access_level_id

    RevokeAccessRequest:
      type: object
      properties:
        access_level_id:
          type: string
          description: 在访问等级页面中配置的付费访问等级 ID
        revoke_at:
          type: string
          format: date-time
          nullable: true
          description: 指定访问等级到期的时间。若要立即撤销访问权限，请省略此字段或将其设置为 null。默认值为 null。
      required:
        - access_level_id

    RefundSaverSettingsRequest:
      type: object
      properties:
        custom_preference:
          type: string
          enum: [grant, no_preference, decline]
          nullable: true
          description: |
            为用户单独设置退款偏好。
            - `grant`：批准每个退款请求
            - `no_preference`：不提供任何建议
            - `decline`：拒绝每个退款请求
        consent:
          type: boolean
          nullable: true
          description: |
            记录用户是否同意共享其数据。
            - `true` 表示如果您收到应用内退款请求，您可以向 Apple 提供有关该用户的信息
      example:
        custom_preference: "grant"
        consent: true

    RefundSaverSettingsResponse:
      type: object
      properties:
        profile_id:
          type: string
          format: uuid
          description: 客户用户画像 ID
        settings:
          type: object
          properties:
            consent:
              type: boolean
              description: 定义用户是否同意共享其数据
            custom_preference:
              type: string
              enum: [grant, no_preference, decline]
              description: 退款偏好
          description: 用户的退款保护设置
      required:
        - profile_id
        - settings

