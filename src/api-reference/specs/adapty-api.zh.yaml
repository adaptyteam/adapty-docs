          type: string
          description: 应用商店中的产品 ID
        store:
          type: string
          description: 购买访问等级的商店。常见值包括 app_store、play_store、stripe、paddle 或任何自定义商店标识符
        activated_at:
          type: string
          format: date-time
          description: 访问等级激活时间
        renewed_at:
          type: string
          format: date-time
          nullable: true
          description: 访问等级最后续订时间
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 访问等级到期时间（永久授权为 null）
        is_lifetime:
          type: boolean
          description: 是否为永久授权
        active_introductory_offer_type:
          type: string
          nullable: true
          description: 有效新用户优惠的类型
        active_promotional_offer_type:
          type: string
          nullable: true
          description: 有效促销活动的类型
        will_renew:
          type: boolean
          description: 访问等级是否将自动续订
        is_in_grace_period:
          type: boolean
          description: 访问等级是否处于宽限期
        unsubscribed_at:
          type: string
          format: date-time
          nullable: true
          description: 用户取消订阅的时间
        billing_issue_detected_at:
          type: string
          format: date-time
          nullable: true
          description: 检测到账单问题的时间
      required:
        - id
        - is_active
        - vendor_product_id
        - store
        - activated_at
        - renewed_at
        - expires_at
        - is_lifetime
        - active_introductory_offer_type
        - active_promotional_offer_type
        - will_renew
        - is_in_grace_period
        - unsubscribed_at
        - billing_issue_detected_at

