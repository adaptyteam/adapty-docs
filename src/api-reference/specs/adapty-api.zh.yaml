components:
  securitySchemes:
    apikeyAuth:
      type: apiKey
      name: Authorization
      in: header
      default: Api-Key {Your secret API key}
      description: |
        API 请求必须通过您的密钥 API 密钥进行身份验证，将其作为 **Authorization** 请求头，值为 `Api-Key {your_secret_api_key}`，例如 `Api-Key secret_live_...`。请在 Adapty 看板 -> **App Settings** -> **General** 标签页 -> **API keys** 部分中找到此密钥。
  requestBodies:
    DefaultJson:
      required: true
      content:
        application/json:
          schema:
            type: object
  schemas:
    ProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          nullable: true
          description: 您的终端用户的名字
        last_name:
          type: string
          nullable: true
          description: 您的终端用户的姓氏
        gender:
          type: string
          nullable: true
          enum: [f, m, o]
          description: 您的终端用户的性别
        email:
          type: string
          nullable: true
          format: email
          description: 您的终端用户的电子邮件
        phone_number:
          type: string
          nullable: true
          description: 您的终端用户的电话号码
        birthday:
          type: string
          format: date
          nullable: true
          description: 您的终端用户的生日
        ip_country:
          type: string
          nullable: true
          description: 终端用户所在国家，采用 ISO 3166-2 格式
        ip_v4_address:
          type: string
          nullable: true
          description: 终端用户的 IPv4 地址
        store_country:
          type: string
          nullable: true
          description: 终端用户应用商店所在国家
        store:
          type: string
          nullable: true
          enum: [app_store, play_store, stripe, adapty, paddle]
          description: 用户在您应用中进行购买所使用的平台
        store_account_token:
          type: string
          format: uuid
          nullable: true
          description: 商店账户令牌
        att_status:
          type: integer
          nullable: true
          enum: [0, 1, 2, 3]
          description: Apple App Tracking Transparency 状态（0=未确定，1=受限，2=已拒绝，3=已授权）
        analytics_disabled:
          type: boolean
          nullable: true
          description: 退出外部数据分析的选项
        custom_attributes:
          type: array
          items:
            $ref: '#/components/schemas/CustomAttribute'
          description: 允许为用户画像设置最多 30 个自定义属性
        installation_meta:
          $ref: '#/components/schemas/InstallationMeta'
      required:
        - installation_meta
      example:
        first_name: "Jane"
        last_name: "Doe"
        gender: "f"
        email: "jane.doe@example.com"
        phone_number: "+1234567890"
        birthday: "2000-12-31"
        ip_country: "FR"
        ip_v4_address: "192.168.1.1"
        store_country: "US"
        store: "app_store"
        store_account_token: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        att_status: 3
        analytics_disabled: true
        custom_attributes:
          - key: "favourite_sport"
            value: "yoga"
        installation_meta:
          device_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
          device: "iPhone 15 Pro"
          locale: "en"
          os: "iOS 17.1"
          platform: "iOS"
          timezone: "Europe/Rome"
          user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 17_1_1 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.1 Mobile/15E148 Safari/604.1"
