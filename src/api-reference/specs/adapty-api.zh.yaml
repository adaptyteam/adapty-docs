    ProfileObject:
      type: object
      description: |
        用户画像代表您应用中的一个终端用户。它包含用户的所有订阅数据、购买历史和自定义属性。用户画像通过 customer_user_id（您的内部用户 ID）或 profile_id（Adapty 的内部 ID）进行标识。
