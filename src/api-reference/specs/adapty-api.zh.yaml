          type: string
          description: 用于数据分析的用户市场细分哈希值
        timestamp:
          type: integer
          format: int64
          description: 最后一次用户画像更新的 Unix 时间戳
        custom_attributes:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: 属性键
              value:
                type: string
                description: 属性值
