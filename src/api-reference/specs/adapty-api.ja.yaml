        custom_attributes:
          type: array
          items:
            $ref: '#/components/schemas/CustomAttribute'
          description: プロファイルに最大 30 個のカスタム属性を設定できます
        installation_meta:
          $ref: '#/components/schemas/InstallationMeta'
      required:
        - installation_meta
      example:
