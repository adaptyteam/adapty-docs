    TransactionDTORequest:
      oneOf:
        - $ref: '#/components/schemas/OneTimePurchaseDTO'
        - $ref: '#/components/schemas/SubscriptionDTO'
      discriminator:
        propertyName: purchase_type

    OneTimePurchaseDTO:
      type: object
      title: One-time Purchase
      description: 買い切り購入のトランザクションデータ
      properties:
        purchase_type:
          type: string
          enum: [one_time_purchase]
          description: 購入の種別
        store:
          type: string
          description: 購入が行われたストア。一般的な値には `app_store`、`play_store`、`stripe`、`paddle`、またはカスタムストア識別子が含まれます
        environment:
          type: string
          enum: [Production, Sandbox]
          default: Production
          description: 購入が行われた環境
        store_product_id:
          type: string
          description: ストアにおけるプロダクト ID
        store_transaction_id:
          type: string
          maxLength: 50
          description: ストアにおけるトランザクション ID。最大 50 文字。PayPal および一部のカスタムストアのトランザクション ID はこれを超える場合があります。その場合は送信前に値をトリミングまたはハッシュ化してください。そうしないとリクエストが失敗します。
        store_original_transaction_id:
          type: string
          description: ストアにおける元のトランザクション ID
        is_family_shared:
          type: boolean
          default: false
          description: ファミリー共有の購入かどうか
        price:
          $ref: '#/components/schemas/PriceDTO'
        purchased_at:
          type: string
          format: date-time
          description: 購入が行われた日時
        variation_id:
          type: string
          nullable: true
          description: A/B テスト用のバリエーション ID
        offer:
          $ref: '#/components/schemas/OfferDTO'
          nullable: true
        refunded_at:
          type: string
          format: date-time
          nullable: true
          description: 購入が返金された日時
        cancellation_reason:
          type: string
          enum: [billing_error, cancelled_by_developer, new_subscription_replace, price_increase, product_was_not_available, refund, unknown, upgraded, voluntarily_cancelled, adapty_revoked]
          nullable: true
          description: キャンセルの理由
      required:
        - purchase_type
        - store
        - store_product_id
        - store_transaction_id
        - store_original_transaction_id
        - price
        - purchased_at

    SubscriptionDTO:
      type: object
      title: Subscription
      description: サブスクリプション購入のトランザクションデータ
      properties:
        purchase_type:
          type: string
          enum: [subscription]
          description: 購入の種別
        store:
          type: string
          description: 購入が行われたストア。一般的な値には `app_store`、`play_store`、`stripe`、`paddle`、またはカスタムストア識別子が含まれます
        environment:
          type: string
          enum: [Production, Sandbox]
          default: Production
          description: 購入が行われた環境
        store_product_id:
          type: string
          description: ストアにおけるプロダクト ID
        store_transaction_id:
          type: string
          maxLength: 50
          description: ストアにおけるトランザクション ID。最大 50 文字。PayPal および一部のカスタムストアのトランザクション ID はこれを超える場合があります。その場合は送信前に値をトリミングまたはハッシュ化してください。そうしないとリクエストが失敗します。
        store_original_transaction_id:
          type: string
          description: ストアにおける元のトランザクション ID
        is_family_shared:
          type: boolean
          default: false
          description: ファミリー共有の購入かどうか
        price:
          $ref: '#/components/schemas/PriceDTO'
        purchased_at:
          type: string
          format: date-time
          description: 購入が行われた日時
        variation_id:
          type: string
          nullable: true
          description: A/B テスト用のバリエーション ID
        offer:
          $ref: '#/components/schemas/OfferDTO'
          nullable: true
        refunded_at:
          type: string
          format: date-time
          nullable: true
          description: 購入が返金された日時
        cancellation_reason:
          type: string
          enum: [billing_error, cancelled_by_developer, new_subscription_replace, price_increase, product_was_not_available, refund, unknown, upgraded, voluntarily_cancelled, adapty_revoked]
          nullable: true
          description: キャンセルの理由
        originally_purchased_at:
          type: string
          format: date-time
          description: サブスクリプションが最初に購入された日時
        expires_at:
          type: string
          format: date-time
          description: サブスクリプションの有効期限
        renew_status:
          type: boolean
          description: サブスクリプションが自動更新されるかどうか
        renew_status_changed_at:
          type: string
          format: date-time
          nullable: true
          description: 更新ステータスが変更された日時
        billing_issue_detected_at:
          type: string
          format: date-time
          nullable: true
          description: 請求問題が検出された日時
        grace_period_expires_at:
          type: string
          format: date-time
          nullable: true
          description: グレース期間の終了日時
      required:
        - purchase_type
        - store
        - store_product_id
        - store_transaction_id
        - store_original_transaction_id
        - price
        - purchased_at
        - originally_purchased_at
        - expires_at
        - renew_status

    PriceDTO:
      type: object
      properties:
        country:
          type: string
          description: 国コード
        currency:
          type: string
          description: 通貨コード
        value:
          type: number
          format: float
          description: 価格の値
      required:
        - country
        - currency
        - value

    OfferDTO:
      type: object
      properties:
        category:
          type: string
          enum: [introductory, promotional, offer_code, win_back]
          description: オファーのカテゴリ
        type:
          type: string
          enum: [free_trial, pay_as_you_go, pay_up_front]
          description: オファーの種別
        id:
          type: string
          nullable: true
          description: オファー ID
      required:
        - category
        - type

    GrantAccessRequest:
      type: object
      properties:
        access_level_id:
          type: string
          description: アクセスレベルページで設定された有料アクセスレベル ID
        starts_at:
          type: string
          format: date-time
          nullable: true
          description: アクセスレベルが有効になる日時。将来の日時も指定できます。デフォルト値は null です。
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: アクセスレベルが失効する日時。過去の日時も指定でき、永続アクセスの場合は null を指定できます。デフォルト値は null です。
      required:
        - access_level_id

    RevokeAccessRequest:
      type: object
      properties:
        access_level_id:
          type: string
          description: アクセスレベルページで設定された有料アクセスレベル ID
        revoke_at:
          type: string
          format: date-time
          nullable: true
          description: アクセスレベルが失効する日時を指定します。即座にアクセスを失効させるには、このフィールドを省略するか null に設定してください。デフォルト値は null です。
      required:
        - access_level_id

    RefundSaverSettingsRequest:
      type: object
      properties:
        custom_preference:
          type: string
          enum: [grant, no_preference, decline]
          nullable: true
          description: |
            ユーザーごとに返金設定を個別に指定します。
            - `grant`: 各返金リクエストを承認する
            - `no_preference`: 推奨を提供しない
            - `decline`: 各返金リクエストを拒否する
        consent:
          type: boolean
          nullable: true
          description: |
            ユーザーがデータ共有に同意したかどうかを記録します。
            - `true` は、アプリ内返金リクエストを受け取った場合に Apple にユーザー情報を提供できることを意味します
      example:
        custom_preference: "grant"
        consent: true

    RefundSaverSettingsResponse:
      type: object
      properties:
        profile_id:
          type: string
          format: uuid
          description: 顧客プロファイル ID
        settings:
          type: object
          properties:
            consent:
              type: boolean
              description: ユーザーがデータ共有に同意したかどうかを示します
            custom_preference:
              type: string
              enum: [grant, no_preference, decline]
              description: 返金設定
          description: ユーザーの Refund Saver 設定
      required:
        - profile_id
        - settings

    StripeValidationRequest:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              enum: [stripe_receipt_validation_result]
              description: リソースの種別
            attributes:
              type: object
              properties:
                customer_user_id:
                  type: string
                  description: お客様のシステムにおけるユーザーの ID
                stripe_token:
                  type: string
                  description: |
                    一意の購入を表す Stripe オブジェクトのトークン。
                    Stripe のサブスクリプション（sub_XXX）または支払いインテント（pi_XXX）のトークンが使用できます
              required:
                - customer_user_id
                - stripe_token
          required:
            - type
            - attributes
      required:
        - data

    StripeValidationResponse:
      type: object
      properties:
        data:
          type: object
          nullable: true
          description: レスポンスデータ（検証成功時は null）
      required:
        - data

    StripeErrorResponse:
