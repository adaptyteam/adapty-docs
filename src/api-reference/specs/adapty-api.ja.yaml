          items:
            $ref: '#/components/schemas/RemoteConfigObject'
          description: 各ロケール向けのリモートコンフィグの配列
        main_screenshot:
          type: object
          nullable: true
          properties:
            image_id:
              type: integer
              description: 画像の一意の識別子
            url:
              type: string
              format: uri
              description: 画像の URL
          required: [image_id, url]
          description: image_id と url を含むメインスクリーンショットオブジェクト
      required:
        - title
        - paywall_id
        - use_paywall_builder
        - use_paywall_builder_legacy
        - updated_at
        - created_at
        - state
        - is_deleted
        - products

    ProductObject:
      type: object
      description: |
        プロダクトはアプリで購入可能なアイテムを表します。サブスクリプションまたは買い切り購入プロダクトが該当します。
      properties:
        product_id:
          type: string
          format: uuid
          description: プロダクトの一意の識別子
        title:
          type: string
          description: プロダクトのタイトル
        product_set:
          type: string
          description: プロダクトセットのカテゴリ
        offer:
          type: object
          nullable: true
          properties:
            product_offer_id:
              type: string
              format: uuid
              description: プロダクトオファーの一意の識別子
            title:
              type: string
              description: オファーのタイトル
          required: [product_offer_id, title]
          description: プロダクトオファー情報
      required:
        - product_id
        - title
        - product_set
        - offer

    RemoteConfigObject:
      type: object
      description: |
        リモートコンフィグはペイウォールのロケール固有の設定データを含みます。これにより、異なる言語向けにペイウォールの外観と動作をカスタマイズできます。
      properties:
        locale:
          type: string
          description: リモートコンフィグのロケール（例："en"、"es"、"fr"）
        data:
          type: string
          description: リモートコンフィグデータを含む JSON 文字列
      required:
        - locale
        - data

    IntegrationIdentifiersObject:
      type: object
      description: |
        インテグレーション識別子にはさまざまなサードパーティサービスのユーザー ID が含まれます。これらは異なるアナリティクスおよびマーケティングプラットフォーム間でユーザーデータを同期するために使用されます。
      properties:
        adjust_device_id:
          type: string
          nullable: true
          description: Adjust インテグレーションにおけるネットワークユーザーの ID
        airbridge_device_id:
          type: string
          nullable: true
          description: Airbridge インテグレーションにおけるユーザーデバイスの ID
        amplitude_device_id:
          type: string
          nullable: true
          description: Amplitude インテグレーションにおけるユーザーデバイスの ID
        amplitude_user_id:
          type: string
          nullable: true
          description: Amplitude インテグレーションにおけるユーザーの ID
        appmetrica_device_id:
          type: string
          nullable: true
          description: AppMetrica インテグレーションにおけるユーザーデバイスの ID
        appmetrica_profile_id:
          type: string
          nullable: true
          description: AppMetrica インテグレーションにおけるユーザーの ID
        appsflyer_id:
          type: string
          nullable: true
          description: AppsFlyer インテグレーションにおけるネットワークユーザーの ID
        branch_id:
          type: string
          nullable: true
          description: Branch インテグレーションにおけるユーザーアプリの Branch キー
        facebook_anonymous_id:
          type: string
          nullable: true
          description: Facebook Ads インテグレーションにおけるユーザーの ID
        firebase_app_instance_id:
          type: string
          nullable: true
          description: Firebase インテグレーションにおけるユーザーの ID
        mixpanel_user_id:
          type: string
          nullable: true
          description: Mixpanel インテグレーションにおけるユーザーの ID
        one_signal_player_id:
          type: string
          nullable: true
          description: OneSignal インテグレーションにおけるユーザーの ID（レガシー識別子）
        one_signal_subscription_id:
          type: string
          nullable: true
          description: OneSignal インテグレーションにおけるユーザーの ID（推奨識別子）
        posthog_distinct_user_id:
          type: string
          nullable: true
          description: PostHog インテグレーションにおけるユーザーの ID
        pushwoosh_hwid:
          type: string
          nullable: true
          description: Pushwoosh インテグレーションにおけるユーザーデバイスの ID
        tenjin_analytics_installation_id:
          type: string
          nullable: true
          description: Tenjin インテグレーションにおけるユーザーデバイスの ID

    RefundSaverSettingsObject:
      type: object
      description: |
        Refund Saver 設定には返金リクエストを処理するためのユーザー設定が含まれます。データ共有の同意とカスタム返金設定が含まれます。
      properties:
        consent:
          type: boolean
          description: ユーザーがデータ共有に同意したかどうかを示します
        custom_preference:
          type: string
          enum: [grant, no_preference, decline]
          description: 返金設定
      required:
        - consent
        - custom_preference

    ErrorObject:
      type: object
      description: |
        エラーは API のエラーレスポンスを表します。何が問題であったか、およびその修正方法に関する情報を含みます。
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                nullable: true
                description: エラーを引き起こしたフィールドまたはパラメータ
              errors:
                type: array
                items:
                  type: string
                description: エラーメッセージの配列
            required: [errors]
          description: エラー詳細の配列
        error_code:
          type: string
          description: 機械可読なエラーコード
        status_code:
          type: integer
          description: HTTP ステータスコード
      required:
        - errors
        - error_code
        - status_code

    PaginationObject:
      type: object
      description: |
        一覧エンドポイントのページネーションメタデータ。現在のページと総件数に関する情報を含みます。
      properties:
        count:
          type: integer
          description: アイテムの総数
        page:
          type: integer
          description: 現在のページ番号
        pages:
          type: integer
          description: 総ページ数
      required:
        - count
        - page
        - pages