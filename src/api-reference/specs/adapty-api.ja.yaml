        store_product_id:
          type: string
          description: ストアにおけるプロダクト ID
        store_transaction_id:
          type: string
          description: ストアにおけるトランザクション ID
        purchased_at:
          type: string
          format: date-time
          description: 購入が行われた日時
        environment:
          type: string
          enum: [Production, Sandbox]
          description: 購入が行われた環境
        is_refund:
          type: boolean
          description: 返金済み購入かどうか
        is_consumable:
          type: boolean
          description: 消耗型アイテムの購入かどうか
      required:
        - purchase_id
        - store
        - store_product_id
        - store_transaction_id
        - purchased_at
        - environment
        - is_refund
        - is_consumable

