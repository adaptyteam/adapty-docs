    ProfileObject:
      type: object
      description: |
        プロファイルはアプリのエンドユーザーを表します。ユーザーのサブスクリプションデータ、購入履歴、カスタム属性をすべて含みます。プロファイルは customer_user_id（お客様の内部ユーザー ID）または profile_id（Adapty の内部 ID）で識別されます。
      properties:
        app_id:
          type: string
          format: uuid
          description: Adapty におけるアプリの一意の識別子
        profile_id:
          type: string
          format: uuid
          description: Adapty におけるプロファイルの一意の識別子
        customer_user_id:
          type: string
          nullable: true
          description: お客様のシステムにおけるユーザーの ID
        total_revenue_usd:
          type: number
          format: float
          description: このユーザーが生み出した USD 換算の総収益
        segment_hash:
          type: string
          description: アナリティクス用のユーザーセグメントのハッシュ
        timestamp:
          type: integer
          format: int64
          description: 最終プロファイル更新の Unix タイムスタンプ
        custom_attributes:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: 属性のキー
              value:
                type: string
                description: 属性の値
            required: [key, value]
          description: ユーザーのカスタム属性の配列
        access_levels:
          type: array
          items:
            $ref: '#/components/schemas/AccessLevelObject'
          description: ユーザーが保有するアクセスレベルの配列
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionObject'
          description: 有効なサブスクリプションの配列
        non_subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/NonSubscriptionObject'
          description: 買い切り購入の配列
      required:
        - app_id
        - profile_id
        - customer_user_id
        - total_revenue_usd
        - segment_hash
        - timestamp
        - custom_attributes
        - access_levels
        - subscriptions
        - non_subscriptions

    AccessLevelObject:
      type: object
      description: |
        アクセスレベルはアプリの有料機能またはコンテンツ階層を表します。ユーザーは複数のアクセスレベルを持つことができ、各レベルには異なる有効期限を設定できます。
      properties:
        id:
          type: string
          description: アクセスレベルの一意の識別子
        is_active:
          type: boolean
          description: アクセスレベルが現在有効かどうか
        vendor_product_id:
          type: string
          description: |
            アプリストアにおけるプロダクト ID。実際のストアトランザクションなしでアクセスが付与された場合、`vendor_product_id` は以下のいずれかになります：
            - `adapty_server_side_product` — サーバーサイド API（grantAccessLevel）経由で付与された場合。
            - `adapty_dashboard_product` — Adapty ダッシュボードで手動付与された場合。
            - `adapty_promotion` — レガシー。
        store:
          type: string
          description: アクセスレベルが購入されたストア。一般的な値には app_store、play_store、stripe、paddle、またはカスタムストア識別子が含まれます
        activated_at:
          type: string
          format: date-time
          description: アクセスレベルが有効化された日時
        renewed_at:
          type: string
          format: date-time
          nullable: true
          description: アクセスレベルが最後に更新された日時
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: アクセスレベルの有効期限（永続アクセスの場合は null）
        is_lifetime:
          type: boolean
          description: 永続アクセスレベルかどうか
        active_introductory_offer_type:
          type: string
          nullable: true
          description: 有効な初回オファーの種別
        active_promotional_offer_type:
          type: string
          nullable: true
          description: 有効なプロモーションオファーの種別
        will_renew:
          type: boolean
          description: アクセスレベルが自動更新されるかどうか
        is_in_grace_period:
          type: boolean
          description: アクセスレベルがグレース期間中かどうか
        unsubscribed_at:
          type: string
          format: date-time
          nullable: true
          description: ユーザーがサブスクリプションを解除した日時
        billing_issue_detected_at:
          type: string
          format: date-time
          nullable: true
          description: 請求問題が検出された日時
      required:
        - id
        - is_active
        - vendor_product_id
        - store
        - activated_at
        - renewed_at
        - expires_at
        - is_lifetime
        - active_introductory_offer_type
        - active_promotional_offer_type
        - will_renew
        - is_in_grace_period
        - unsubscribed_at
        - billing_issue_detected_at

    SubscriptionObject:
      type: object
      description: |
        サブスクリプションは有効なサブスクリプション購入を表します。サブスクリプションプロダクト、購入詳細、および更新ステータスに関する情報を含みます。
      properties:
        purchase_id:
          type: string
          format: uuid
          description: 購入の一意の識別子
        store:
          type: string
          description: サブスクリプションが購入されたストア。一般的な値には app_store、play_store、stripe、paddle、またはカスタムストア識別子が含まれます
        store_product_id:
          type: string
          description: ストアにおけるプロダクト ID
        store_base_plan_id:
          type: string
          nullable: true
          description: ストアにおけるベースプラン ID
        store_transaction_id:
          type: string
          description: ストアにおけるトランザクション ID
        store_original_transaction_id:
          type: string
          description: ストアにおける元のトランザクション ID
        purchased_at:
          type: string
          format: date-time
          description: サブスクリプションが購入された日時
        environment:
          type: string
          enum: [Production, Sandbox]
          description: 購入が行われた環境
        is_refund:
          type: boolean
          description: 返金済み購入かどうか
        is_consumable:
          type: boolean
          description: 消耗型アイテムの購入かどうか
      required:
        - purchase_id
        - store
        - store_product_id
        - store_base_plan_id
        - store_transaction_id
        - store_original_transaction_id
        - purchased_at
        - environment
        - is_refund
        - is_consumable

    NonSubscriptionObject:
      type: object
      description: |
        非サブスクリプションは買い切り購入を表します。プロダクトと購入詳細に関する情報を含みます。
      properties:
