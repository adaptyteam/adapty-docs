        attribution_channel:
          type: array
          items:
            type: string
          description: 带来该交易的营销渠道
        attribution_campaign:
          type: array
          items:
            type: string
          description: 带来该交易的营销活动
        attribution_adgroup:
          type: array
          items:
            type: string
          description: 带来该交易的归因广告组
        attribution_adset:
          type: array
          items:
            type: string
          description: 带来该交易的归因广告集
        attribution_creative:
          type: array
          items:
            type: string
          description: 广告或营销活动中用于衡量效果的特定视觉或文字素材
        offer_category:
          type: array
          items:
            type: string
          description: 指定您希望获取数据的优惠类别
        offer_type:
          type: array
          items:
            type: string
          description: 指定您希望获取数据的优惠类型
        offer_id:
          type: array
          items:
            type: string
          description: 指定您希望获取数据的具体优惠

    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    UnauthorizedError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    AnalyticsDataResponse:
      type: object
      description: 包含所请求数据图表类型分析数据的响应
      properties:
        data:
          type: object
          description: 包含不同数据图表类型的对象（revenue、proceeds、net_revenue 等）
          additionalProperties:
            $ref: '#/components/schemas/MetricData'

    MetricData:
      type: object
      description: 包含数值、描述和元数据的单个数据图表数据
      properties:
        data:
          type: array
          description: 该数据图表的数据点数组（聚合数据图表可能为空）
          items:
            type: object
        value:
          type: number
          description: 该数据图表的主要数值
        value_from:
          type: number
          nullable: true
          description: 该时间段的起始值（如适用）
        value_to:
          type: number
          nullable: true
          description: 该时间段的结束值（如适用）
        compare_value_from:
          type: number
          nullable: true
          description: 对比时间段的起始值（如适用）
        compare_value_to:
          type: number
          nullable: true
          description: 对比时间段的结束值（如适用）
        title:
          type: string
          description: 数据图表的显示标题
        type:
          type: string
          description: 数据图表类型（例如 'multi'、'single'）
        default_aggregation:
          type: string
          description: 默认聚合方式（例如 'sum'、'average'）
        description:
          type: string
          description: 以 HTML 格式说明该数据图表含义及计算方式的描述
        metric_name:
          type: string
          description: 数据图表的内部名称
        is_json:
          type: boolean
          description: 数据是否为 JSON 格式
        unit:
          type: string
          description: 计量单位（例如 'USD'、'percent'）
        recommended_period:
          type: object
          nullable: true
          description: 该数据图表的推荐日期范围
          properties:
            date_from:
              type: string
              description: 推荐时间段的开始日期
            date_to:
              type: string
              description: 推荐时间段的结束日期
            period_unit:
              type: string
              description: 推荐的时间单位（day、week、month 等）

    CohortDataResponse:
      type: object
      description: 包含同期群分析数据的响应，展示用户随时间的行为变化
      properties:
        data:
          type: array
          description: 同期群分段数组，每个分段代表在同一时间段开始的一组用户
          items:
            $ref: '#/components/schemas/CohortSegment'

    CohortSegment:
      type: object
      description: 代表在同一时间段开始的用户群体的同期群分段
      properties:
        segment_start_date:
          type: string
          description: 该同期群分段的开始日期
        type:
          type: string
          description: 分段类型（'total' 表示聚合数据，'single' 表示单个同期群）
        title:
          type: string
          description: 该同期群分段的显示标题
        total_installs:
          type: integer
          description: 该同期群中应用安装总数
        total_subscriptions:
          type: integer
          description: 该同期群中订阅总数
        total_paid_subscribers:
          type: integer
          description: 该同期群中付费订阅者总数
        total_revenue_usd:
          type: number
          description: 该同期群的 USD 总收入
        total_proceeds_usd:
          type: number
          description: 该同期群扣除商店手续费后的 USD 总收益
        total_net_revenue_usd:
          type: number
          description: 该同期群的 USD 净收入总额
        total_anrpas_usd:
          type: number
          description: 每位活跃订阅者平均净收入（ANRPAS），单位 USD
        total_appas_usd:
          type: number
          description: 每位活跃订阅者平均收益（APPAS），单位 USD
        total_arpas_usd:
          type: number
          description: 每位活跃订阅者平均收入（ARPAS），单位 USD
        total_anrppu_usd:
          type: number
          description: 每位付费用户平均净收入（ANRPPU），单位 USD
        total_apppu_usd:
          type: number
          description: 每位付费用户平均收益（APPPU），单位 USD
        total_arppu_usd:
          type: number
          description: 每位付费用户平均收入（ARPPU），单位 USD
        total_anrpu_usd:
          type: number
          description: 每位用户平均净收入（ANRPU），单位 USD
        total_appu_usd:
          type: number
          description: 每位用户平均收益（APPU），单位 USD
        total_arpu_usd:
          type: number
          description: 每位用户平均收入（ARPU），单位 USD
        predict:
          type: object
          nullable: true
          description: 该同期群的趋势预测数据（如有）
        values:
          type: array
          description: 基于时间段的数值数组，展示同期群随时间的表现
          items:
            $ref: '#/components/schemas/CohortValue'

    CohortValue:
      type: object
      description: 同期群分段中特定时间段的单个数值，展示该时间段的性能数据图表
      properties:
        arpas_usd:
          type: number
          description: 该时间段每位活跃订阅者平均收入，单位 USD
        appas_usd:
          type: number
          description: 该时间段每位活跃订阅者平均收益，单位 USD
        anrpas_usd:
          type: number
          description: 该时间段每位活跃订阅者平均净收入，单位 USD
        anrppu_usd:
          type: number
          description: 该时间段每位付费用户平均净收入，单位 USD
        apppu_usd:
          type: number
          description: 该时间段每位付费用户平均收益，单位 USD
        arppu_usd:
          type: number
          description: 该时间段每位付费用户平均收入，单位 USD
        anrpu_usd:
          type: number
          description: 该时间段每位用户平均净收入，单位 USD
        appu_usd:
          type: number
          description: 该时间段每位用户平均收益，单位 USD
        arpu_usd:
          type: number
          description: 该时间段每位用户平均收入，单位 USD
        installs:
          type: integer
          description: 该时间段的应用安装数量
        period:
          type: integer
          description: 时间段编号（1 = 第一个时间段，2 = 第二个时间段，以此类推）
        revenue_usd:
          type: number
          description: 该时间段的 USD 总收入
        proceeds_usd:
          type: number
          description: 该时间段扣除商店手续费后的 USD 总收益
        net_revenue_usd:
          type: number
          description: 该时间段的 USD 净收入总额
        revenue_relative:
          type: number
          description: 相对于第一个时间段的收入百分比（100% = 第一个时间段）
        proceeds_relative:
          type: number
          description: 相对于第一个时间段的收益百分比（100% = 第一个时间段）
        net_revenue_relative:
          type: number
          description: 相对于第一个时间段的净收入百分比（100% = 第一个时间段）
        subscriptions:
          type: integer
          description: 该时间段的订阅数量
        subscriptions_relative:
          type: number
          description: 相对于第一个时间段的订阅百分比（100% = 第一个时间段）
        subscribers:
          type: integer
          description: 该时间段的订阅者数量
        subscribers_relative:
          type: number
          description: 相对于第一个时间段的订阅者百分比（100% = 第一个时间段）
        currently_active_period:
          type: boolean
          description: 该时间段是否为同期群当前活跃时间段

    ConversionDataResponse:
      type: object
      description: 包含转化数据的响应，展示用户在订阅状态之间的流转情况
      properties:
        data:
          type: array
          description: 转化数据点数组（聚合数据图表可能为空）
          items:
            type: object
        value:
          type: number
          description: 转化率数值
        value_from:
          type: integer
          description: 转化的起始订阅状态
        value_to:
          type: integer
          description: 转化的目标订阅状态
        compare_value_from:
          type: number
          nullable: true
          description: 对比时间段的起始值
        compare_value_to:
          type: number
          nullable: true
          description: 对比时间段的结束值
        title:
          type: string
          description: 描述转化类型的显示标题
        type:
          type: string
          description: 转化数据图表的类型
        default_aggregation:
          type: string
          description: 该数据图表的默认聚合方式
        description:
          type: string
          description: 转化率计算方式的详细说明
        metric_name:
          type: string
          description: 转化数据图表的内部名称
        is_json:
          type: boolean
          description: 数据是否为 JSON 格式
        unit:
          type: string
          description: 计量单位（转化率通常为 'percent'）
        recommended_period:
          type: object
          description: 该转化数据图表的推荐日期范围
          properties:
            date_from:
              type: string
              description: 推荐时间段的开始日期
            date_to:
              type: string
              description: 推荐时间段的结束日期
            period_unit:
              type: string
              description: 推荐的时间单位

    FunnelDataResponse:
      type: object
      description: 包含漏斗分析数据的响应，展示用户在转化流程各阶段的进展情况
      properties:
        data:
          type: array
          description: 漏斗分段数组，展示转化流程的不同阶段
          items:
            $ref: '#/components/schemas/FunnelSegment'

    FunnelSegment:
      type: object
      description: 代表转化流程中某一阶段的漏斗分段
      properties:
        title:
          type: string
          description: 该漏斗分段的显示标题
        type:
          type: string
          description: 漏斗分段类型（'total' 表示聚合数据）
        values:
          type: array
          description: 展示各阶段用户进展的漏斗数值数组
          items:
            $ref: '#/components/schemas/FunnelValue'

    FunnelValue:
      type: object
      description: 漏斗各阶段的单个数值，展示用户进展和流失情况
      properties:
        period:
          type: integer
          description: 漏斗中的阶段编号（-2 = 安装，-1 = 显示付费墙，以此类推）
        title:
          type: string
          description: 该漏斗阶段的显示标题
        value:
          type: integer
          description: 到达该阶段的用户数量
        value_relative:
          type: number
          description: 到达该阶段的用户占第一阶段的百分比
        relative_changes:
          type: number
          description: 与上一时间段相比的转化率变化
        following_changes:
          type: object
          description: 在该阶段之后流失的用户信息
          properties:
            title:
              type: string
              description: 流失阶段的标题
            value:
              type: integer
              description: 流失的用户数量
            value_relative:
              type: number
              description: 流失用户的百分比
        churn_reason_title:
          type: string
          description: 描述该阶段用户流失原因的标题
        churn_reasons:
          type: array
          description: 具体流失原因的数组
          items:
            type: object
        values:
          type: array
          description: 该漏斗阶段的附加嵌套数值
          items:
            type: object

    LTVDataResponse:
      type: object
      description: 包含不同收入类型生命周期价值（LTV）数据的响应
      properties:
        revenue:
          $ref: '#/components/schemas/LTVMetric'
          description: 基于总收入计算的 LTV
        proceeds:
          $ref: '#/components/schemas/LTVMetric'
          description: 基于收益（扣除商店手续费后）计算的 LTV
        net_revenue:
          $ref: '#/components/schemas/LTVMetric'
          description: 基于净收入计算的 LTV

    LTVMetric:
      type: object
      description: 包含同期群数据和计算结果的单个 LTV 数据图表
      properties:
        data:
          type: array
          description: 不同同期群的 LTV 数据点数组
          items:
            $ref: '#/components/schemas/LTVData'
        description:
          type: string
          description: 以 HTML 格式说明 LTV 计算方式的描述
        value:
          type: number
          description: 整体 LTV 数值
        unit:
          type: string
          description: 计量单位（通常为 'USD'）
        title:
          type: string
          description: 该 LTV 数据图表的显示标题

    LTVData:
      type: object
      description: 特定同期群的单个 LTV 数据点
      properties:
        title:
          type: string
          description: 该 LTV 数据点的显示标题
        type:
          type: string
          description: LTV 数据类型（'total' 表示聚合数据）
        value:
          type: number
          description: 该同期群的 LTV 数值
        values:
          type: array
          description: 基于时间段的 LTV 数值数组
          items:
            type: object
        cohort_size:
          type: integer
          description: 该同期群中的用户数量

    RetentionDataResponse:
      type: object
      description: 包含留存数据的响应，展示用户随时间的活跃程度
      properties:
        data:
          type: array
          description: 留存数据点数组（部分留存类型可能为空）
          items:
            type: object
        title:
          type: string
          description: 留存数据图表的显示标题
        metric_name:
          type: string
          description: 留存数据图表的内部名称
        description:
          type: string
          description: 留存计算方式的说明（绝对值与相对值）
        value_type:
          type: string
          nullable: true
          description: 留存数值的类型（绝对值或相对值）

