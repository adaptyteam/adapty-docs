    RemoteConfigObject:
      type: object
      description: |
        Remote Config chứa dữ liệu cấu hình theo ngôn ngữ cụ thể cho một paywall.
        Điều này cho phép bạn tùy chỉnh giao diện và hành vi của paywall cho các ngôn ngữ khác nhau.
      properties:
        locale:
          type: string
          description: Ngôn ngữ cho Remote Config (ví dụ: "en", "es", "fr")
        data:
          type: string
          description: Chuỗi JSON chứa dữ liệu Remote Config
      required:
        - locale
        - data

