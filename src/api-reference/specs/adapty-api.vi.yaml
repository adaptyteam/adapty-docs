    RefundSaverSettingsObject:
      type: object
      description: |
        Cài đặt Refund Saver chứa tùy chọn của người dùng để xử lý các yêu cầu hoàn tiền.
        Bao gồm sự đồng ý chia sẻ dữ liệu và tùy chọn hoàn tiền tùy chỉnh.
      properties:
        consent:
          type: boolean
          description: Xác định liệu người dùng có đồng ý chia sẻ dữ liệu của họ hay không
        custom_preference:
          type: string
          enum: [grant, no_preference, decline]
          description: Tùy chọn hoàn tiền
      required:
        - consent
        - custom_preference

    ErrorObject:
      type: object
      description: |
        Lỗi đại diện cho phản hồi lỗi API. Nó chứa thông tin về
        những gì đã xảy ra và cách khắc phục.
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                nullable: true
                description: Trường hoặc tham số gây ra lỗi
              errors:
                type: array
                items:
                  type: string
                description: Mảng thông báo lỗi
            required: [errors]
          description: Mảng chi tiết lỗi
        error_code:
          type: string
          description: Mã lỗi có thể đọc bằng máy
        status_code:
          type: integer
          description: Mã trạng thái HTTP
      required:
        - errors
        - error_code
        - status_code

    PaginationObject:
      type: object
      description: |
        Metadata phân trang cho các endpoint danh sách. Chứa thông tin về
        trang hiện tại và tổng số kết quả.
      properties:
        count:
          type: integer
          description: Tổng số mục
        page:
          type: integer
          description: Số trang hiện tại
        pages:
          type: integer
          description: Tổng số trang
      required:
        - count
        - page
        - pages