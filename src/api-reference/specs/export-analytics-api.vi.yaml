          description: Dữ liệu có ở định dạng JSON hay không
        unit:
          type: string
          description: Đơn vị đo lường (thường là 'percent' cho tỷ lệ chuyển đổi)
        recommended_period:
          type: object
          description: Khoảng ngày được đề xuất cho chỉ số chuyển đổi này
          properties:
            date_from:
              type: string
              description: Ngày bắt đầu của kỳ được đề xuất
            date_to:
              type: string
              description: Ngày kết thúc của kỳ được đề xuất
            period_unit:
              type: string
              description: Đơn vị kỳ được đề xuất

    FunnelDataResponse:
      type: object
      description: Phản hồi chứa dữ liệu phân tích phễu hiển thị hành trình của người dùng qua các giai đoạn chuyển đổi
      properties:
        data:
          type: array
          description: Mảng các phân khúc phễu hiển thị các giai đoạn khác nhau của quá trình chuyển đổi
          items:
            $ref: '#/components/schemas/FunnelSegment'

    FunnelSegment:
      type: object
      description: Một phân khúc phễu đại diện cho một giai đoạn trong quá trình chuyển đổi
      properties:
        title:
          type: string
          description: Tiêu đề hiển thị của phân khúc phễu này
        type:
          type: string
          description: Loại phân khúc phễu ('total' cho dữ liệu tổng hợp)
        values:
          type: array
          description: Mảng các giá trị phễu hiển thị hành trình qua các giai đoạn
          items:
            $ref: '#/components/schemas/FunnelValue'

    FunnelValue:
      type: object
      description: Giá trị giai đoạn phễu riêng lẻ hiển thị hành trình và tỷ lệ rời bỏ của người dùng
      properties:
        period:
          type: integer
          description: Số kỳ trong phễu (-2 = Cài đặt, -1 = Hiển thị paywall, v.v.)
        title:
          type: string
          description: Tiêu đề hiển thị của giai đoạn phễu này
        value:
          type: integer
          description: Số người dùng đạt đến giai đoạn này
        value_relative:
          type: number
          description: Tỷ lệ phần trăm người dùng đạt đến giai đoạn này so với giai đoạn đầu tiên
        relative_changes:
          type: number
          description: Thay đổi tỷ lệ chuyển đổi so với kỳ trước
        following_changes:
          type: object
          description: Thông tin về người dùng đã rời bỏ sau giai đoạn này
          properties:
            title:
              type: string
              description: Tiêu đề cho giai đoạn rời bỏ
            value:
              type: integer
              description: Số người dùng đã rời bỏ
            value_relative:
              type: number
              description: Tỷ lệ phần trăm người dùng đã rời bỏ
        churn_reason_title:
          type: string
          description: Tiêu đề mô tả lý do rời bỏ ở giai đoạn này
        churn_reasons:
          type: array
          description: Mảng các lý do rời bỏ cụ thể
          items:
            type: object
        values:
          type: array
          description: Các giá trị lồng nhau bổ sung cho giai đoạn phễu này
          items:
            type: object

    LTVDataResponse:
      type: object
      description: Phản hồi chứa dữ liệu Lifetime Value (LTV) cho các loại doanh thu khác nhau
      properties:
        revenue:
          $ref: '#/components/schemas/LTVMetric'
          description: LTV được tính bằng doanh thu gộp
        proceeds:
          $ref: '#/components/schemas/LTVMetric'
          description: LTV được tính bằng số tiền nhận được (sau phí cửa hàng)
        net_revenue:
          $ref: '#/components/schemas/LTVMetric'
          description: LTV được tính bằng doanh thu ròng

    LTVMetric:
      type: object
      description: Chỉ số LTV riêng lẻ chứa dữ liệu cohort và các tính toán
      properties:
        data:
          type: array
          description: Mảng các điểm dữ liệu LTV cho các cohort khác nhau
          items:
            $ref: '#/components/schemas/LTVData'
        description:
          type: string
          description: Mô tả HTML giải thích cách tính LTV
        value:
          type: number
          description: Giá trị LTV tổng thể
        unit:
          type: string
          description: Đơn vị đo lường (thường là 'USD')
        title:
          type: string
          description: Tiêu đề hiển thị của chỉ số LTV này

    LTVData:
      type: object
      description: Điểm dữ liệu LTV riêng lẻ cho một cohort cụ thể
      properties:
        title:
          type: string
          description: Tiêu đề hiển thị của điểm dữ liệu LTV này
        type:
          type: string
          description: Loại dữ liệu LTV ('total' cho dữ liệu tổng hợp)
        value:
          type: number
          description: Giá trị LTV cho cohort này
        values:
          type: array
          description: Mảng các giá trị LTV theo kỳ
          items:
            type: object
        cohort_size:
          type: integer
          description: Số người dùng trong cohort này

    RetentionDataResponse:
      type: object
      description: Phản hồi chứa dữ liệu giữ chân người dùng hiển thị mức độ tương tác của người dùng theo thời gian
      properties:
        data:
          type: array
          description: Mảng các điểm dữ liệu giữ chân người dùng (có thể rỗng đối với một số loại giữ chân)
          items:
            type: object
        title:
          type: string
          description: Tiêu đề hiển thị của chỉ số giữ chân người dùng
        metric_name:
          type: string
          description: Tên nội bộ của chỉ số giữ chân người dùng
        description:
          type: string
          description: Giải thích cách tính giữ chân người dùng (giá trị tuyệt đối so với tương đối)
        value_type:
          type: string
          nullable: true
          description: Loại giá trị giữ chân người dùng (tuyệt đối hoặc tương đối)

security:
  - apikeyAuth: []