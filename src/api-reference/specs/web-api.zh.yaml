openapi: 3.1.0
info:
  title: Adapty Web API
  version: 1.0.0
  description: |
    Adapty Web API 允许您将 Adapty 的订阅管理平台集成到您的 Web 应用程序中。
    该 API 提供用于检索付费墙、记录付费墙浏览以及添加归因数据的端点。
servers:
  - url: https://api.adapty.io
    description: 生产服务器
paths:
  /api/v2/web-api/paywall/:
    post:
      summary: 获取付费墙
      description: 从指定版位获取付费墙。
      operationId: getPaywall
      security:
        - apikeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetPaywallRequest'
            examples:
              basic:
                summary: Basic paywall request
                value:
                  store: "app_store"
                  locale: "en"
                  placement_id: "PaywallPlacementId"
                  customer_user_id: "user123"
      responses:
        '200':
          description: 成功响应将包含付费墙对象。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaywallResponse'
              examples:
                basic:
                  summary: Basic paywall response
                  value:
                    placement_id: "onboarding"
                    variation_id: "d76feea0-c0cf-4942-bef5-84ed701fc6db"
                    paywall_id: "9a93fe6f-9162-4dc0-b4b7-73079ed95c34"
                    ab_test_name: "1 week + 1 month | apple picture"
                    paywall_name: "1 week + 1 month | apple picture"
                    products:
                      - title: "1 week"
                        is_consumable: false
                        adapty_product_id: "1c3e03e1-9c43-4f94-aeb5-c7ae2f73d0c2"
                        vendor_product_id: "1_week_apple"
                        introductory_offer_eligibility: true
                        promotional_offer_eligibility: true
                        base_plan_id: null
                        offer: null
                      - title: "1 month"
                        is_consumable: false
                        adapty_product_id: "f4088450-45a8-4737-8db0-367e642d7dcb"
                        vendor_product_id: "1_month_apple"
                        introductory_offer_eligibility: true
                        promotional_offer_eligibility: true
                        base_plan_id: null
                        offer: null
                    remote_config:
                      lang: "en"
                      data: "{\"default_product_number\":1,\"features\":[\"#fresh\",\"#green\",\"#healthy1\"],\"soft_paywall\":false,\"image_url\":\"https://adapty.io/apple.png\"}"
        '400':
          description: 请求错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseError'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: 未找到
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariationIdNotFoundError'

  /api/v2/web-api/paywall/visit/:
    post:
      summary: 记录付费墙浏览
      description: |
        Adapty 可以帮助您衡量付费墙的转化率。但为此，您需要记录付费墙每次展示的时机——
        否则我们只能获知完成购买的用户数据，而无法统计未购买的用户。
        请使用此请求来记录付费墙的浏览事件。
      operationId: recordPaywallView
      security:
        - apikeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaywallViewRequest'
            examples:
              basic:
                summary: Basic paywall view recording
                value:
                  visited_at: "2024-08-24T14:15:22Z"
                  store: "app_store"
                  variation_id: "00000000-0000-0000-0000-000000000000"
                  customer_user_id: "user123"
      responses:
        '201':
          description: 付费墙浏览已成功记录。
          content:
            application/json:
              schema:
                type: object
                description: 空响应体
        '400':
          description: 请求错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidDateFormatError'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: 未找到
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundError'

  /api/v2/web-api/attribution/:
    post:
      summary: 添加自定义归因
      description: 向用户画像添加营销自定义归因数据。
      operationId: addAttribution
      security:
        - apikeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAttributionRequest'
            examples:
              basic:
                summary: Basic attribution data
                value:
                  status: "organic"
                  attribution_user_id: "attribution_user_id_value"
                  channel: "marketing_channel_value"
                  campaign: "campaign_name_value"
                  ad_group: "ad_group_name_value"
                  ad_set: "ad_set_name_value"
                  creative: "creative_name_value"
                  customer_user_id: "user123"
      responses:
        '201':
          description: 归因数据已成功添加至用户画像，响应体为空。
          content:
            application/json:
              schema:
                type: object
                description: 空响应体
        '400':
          description: 请求错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidEnumerationMemberError'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: 未找到
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundError'

components:
  securitySchemes:
    apikeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        API 请求必须通过您的公共 API 密钥进行身份验证，将其作为 **Authorization** 请求头传入，
        格式为 `Api-Key {your_public_api_key}`，例如 `Api-Key public_live_...`。
        您可以在 Adapty 看板 -> **App Settings** -> **General** 标签页 -> **API keys** 部分找到此密钥。

  schemas:
    GetPaywallRequest:
      type: object
      required:
        - store
        - placement_id
      properties:
        store:
          type: string
          description: |
            产品购买所在的商店。可选值：`app_store`、`play_store`、`stripe`，或您自定义商店的 `Store ID`。
          example: "app_store"
        locale:
          type: string
          description: 付费墙语言环境的标识符。该参数应为由一个或多个子标签组成的语言代码，子标签之间以"-"字符分隔，第一个子标签表示语言，第二个子标签表示地区。
          example: "en"
        placement_id:
          type: string
          description: 版位的标识符。此值为您在 Adapty 看板中创建版位时所指定的值。
          example: "PaywallPlacementId"
        customer_user_id:
          type: string
          description: "`customer_user_id` 或 `profile_id` 二者必填其一。您在应用中用于标识用户的用户 ID（如果有的话），例如可以是用户的 UUID、电子邮件或任何其他 ID。"
          example: "user123"
        profile_id:
          type: string
          description: "`customer_user_id` 或 `profile_id` 二者必填其一。用户在 Adapty 中的标识符。"
          example: "3286abd3-48b0-4e9c-a5f6-ac0a006804a6"

    RecordPaywallViewRequest:
      type: object
      required:
        - store
        - variation_id
      properties:
        customer_user_id:
          type: string
          description: 用户在您系统中的标识符。`customer_user_id` 或 `profile_id` 二者必填其一。
          example: "user123"
        profile_id:
          type: string
          description: 用户在 Adapty 中的标识符。`customer_user_id` 或 `profile_id` 二者必填其一。
          example: "3286abd3-48b0-4e9c-a5f6-ac0a006804a6"
        visited_at:
          type: string
          format: date-time
          description: 用户打开付费墙的日期时间。
          example: "2024-08-24T14:15:22Z"
        store:
          type: string
          description: |
            产品购买所在的商店。可选值：`app_store`、`play_store`、`stripe`，或您自定义商店的 `Store ID`。
          example: "app_store"
        variation_id:
          type: string
          format: uuid
          description: 用于将购买行为追踪至特定付费墙的实验变体 ID。
          example: "00000000-0000-0000-0000-000000000000"

    AddAttributionRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [organic, non_organic, unknown]
          description: 表示该归因是自然流量还是非自然流量。
          example: "organic"
        attribution_user_id:
          type: string
          description: 归因来源为用户分配的 ID。
          example: "attribution_user_id_value"
        channel:
          type: string
          description: 营销渠道名称。
          example: "marketing_channel_value"
        campaign:
          type: string
          description: 营销活动名称。
          example: "campaign_name_value"
        ad_group:
          type: string
          description: 归因广告组。
          example: "ad_group_name_value"
        ad_set:
          type: string
          description: 归因广告集。
          example: "ad_set_name_value"
        creative:
          type: string
          description: 归因素材关键词。
          example: "creative_name_value"
        customer_user_id:
          type: string
          description: 您在应用中用于标识用户的用户 ID（如果有的话），例如可以是用户的 UUID、电子邮件或任何其他 ID；如未设置则为 null。`customer_user_id` 或 `profile_id` 二者必填其一。
          example: "user123"
        profile_id:
          type: string
          description: 用户在 Adapty 中的标识符。您可以在 Adapty 看板中该用户画像的 **Adapty ID** 字段中找到此值。`customer_user_id` 或 `profile_id` 二者必填其一。
          example: "3286abd3-48b0-4e9c-a5f6-ac0a006804a6"

    PaywallResponse:
      type: object
      required:
        - placement_id
        - variation_id
        - paywall_id
        - paywall_name
        - products
      properties:
        placement_id:
          type: string
          description: 展示此付费墙的版位 ID。该值在 Adapty 看板中创建版位时设定。
          example: "onboarding"
        variation_id:
          type: string
          format: uuid
          description: 用于追踪与该特定付费墙相关联的购买行为的实验变体 ID。
          example: "d76feea0-c0cf-4942-bef5-84ed701fc6db"
        paywall_id:
          type: string
          format: uuid
          description: 付费墙的唯一标识符。
          example: "9a93fe6f-9162-4dc0-b4b7-73079ed95c34"
        ab_test_name:
          type: string
          description: 所属 A/B 测试的名称。
          example: "1 week + 1 month | apple picture"
        paywall_name:
          type: string
          description: 付费墙名称，与 Adapty 看板中定义的名称一致。
          example: "1 week + 1 month | apple picture"
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          description: 包含付费墙产品信息的产品对象数组。
        remote_config:
          $ref: '#/components/schemas/RemoteConfig'
          description: 包含付费墙完整远程配置的 RemoteConfig 对象。

    Product:
      type: object
      required:
        - is_consumable
        - vendor_product_id
      properties:
        title:
          type: string
          description: 产品名称，来自 Adapty 看板中的产品部分。
        is_consumable:
          type: boolean
          description: 表示该产品是否为消耗型商品。
        adapty_product_id:
          type: string
          format: uuid
          description: Adapty 内部使用的产品 ID。
        vendor_product_id:
          type: string
          description: 应用商店中的产品 ID。
        introductory_offer_eligibility:
          type: boolean
          description: 表示用户是否符合 iOS 新用户优惠的资格。
        promotional_offer_eligibility:
          type: boolean
          description: 表示用户是否符合促销活动的资格。
        base_plan_id:
          type: string
          nullable: true
          description: |
            Google Play 的基础方案 ID 或 Stripe 的价格 ID。
            Google Play 请参见 [Base plan ID](https://support.google.com/googleplay/android-developer/answer/12154973)，
            Stripe 请参见 [price ID](https://docs.stripe.com/products-prices/how-products-and-prices-work#use-products-and-prices)。
        offer:
          allOf:
            - $ref: '#/components/schemas/Offer'
          nullable: true
          description: JSON 格式的 Offer 对象。

    Offer:
      type: object
      required:
        - category
        - type
      properties:
        category:
          type: string
          enum: [introductory, promotional, offer_code, win_back]
          description: 已应用优惠的类别。
        type:
          type: string
          enum: [free_trial, pay_as_you_go, pay_up_front, unknown]
          description: 当前有效优惠的类型。若此值不为 null，表示该优惠已在当前订阅周期内生效。
        id:
          type: string
          nullable: true
          description: 已应用优惠的 ID。

    RemoteConfig:
      type: object
      required:
        - lang
        - data
      properties:
        lang:
          type: string
          description: |
            付费墙本地化的语言环境代码。使用以连字符（-）分隔的语言和地区子标签。
            示例：`en` 表示英语，`pt-br` 表示巴西葡萄牙语。
          example: "en"
        data:
          type: string
          description: |
            表示付费墙远程配置的序列化 JSON 字符串。
            您可以在 Adapty 看板中特定付费墙的"远程配置"标签页中找到此内容。

    ParseError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    UnauthorizedError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    VariationIdNotFoundError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    InvalidDateFormatError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    InvalidEnumerationMemberError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    ProfileNotFoundError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

security:
  - apikeyAuth: []