    ProfileObject:
      type: object
      description: |
        Профиль представляет конечного пользователя в вашем приложении. Он содержит все данные о подписках пользователя,
        историю покупок и пользовательские атрибуты. Профили идентифицируются по customer_user_id
        (внутреннему ID пользователя) или profile_id (внутреннему ID Adapty).
      properties:
        app_id:
          type: string
          format: uuid
          description: Уникальный идентификатор вашего приложения в Adapty
        profile_id:
          type: string
          format: uuid
          description: Уникальный идентификатор профиля в Adapty
        customer_user_id:
          type: string
          nullable: true
          description: ID вашего пользователя в вашей системе
        total_revenue_usd:
          type: number
          format: float
          description: Суммарный доход, сгенерированный данным пользователем, в USD
        segment_hash:
          type: string
          description: Хеш сегмента пользователя для аналитики
        timestamp:
          type: integer
          format: int64
          description: Unix-временная метка последнего обновления профиля
        custom_attributes:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: Ключ атрибута
              value:
                type: string
                description: Значение атрибута
            required: [key, value]
          description: Массив пользовательских атрибутов для пользователя
        access_levels:
          type: array
          items:
            $ref: '#/components/schemas/AccessLevelObject'
          description: Массив уровней доступа пользователя
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionObject'
          description: Массив активных подписок
        non_subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/NonSubscriptionObject'
          description: Массив разовых покупок
      required:
        - app_id
        - profile_id
        - customer_user_id
        - total_revenue_usd
        - segment_hash
        - timestamp
        - custom_attributes
        - access_levels
        - subscriptions
        - non_subscriptions

    AccessLevelObject:
      type: object
      description: |
        Уровень доступа представляет платную функцию или уровень контента в вашем приложении.
        Пользователи могут иметь несколько уровней доступа, каждый из которых может иметь разные даты истечения.
      properties:
        id:
          type: string
          description: Уникальный идентификатор уровня доступа
        is_active:
          type: boolean
          description: Активен ли уровень доступа в данный момент
        vendor_product_id:
          type: string
          description: ID продукта в сторе
        store:
          type: string
          description: Стор, в котором был приобретён уровень доступа. Распространённые значения включают app_store, play_store, stripe, paddle или любой пользовательский идентификатор стора
        activated_at:
          type: string
          format: date-time
          description: Когда был активирован уровень доступа
        renewed_at:
          type: string
          format: date-time
          nullable: true
          description: Когда уровень доступа был последний раз продлён
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Когда истекает уровень доступа (null для пожизненного доступа)
        is_lifetime:
          type: boolean
          description: Является ли это пожизненным доступом
        active_introductory_offer_type:
          type: string
          nullable: true
          description: Тип активного introductory offer
        active_promotional_offer_type:
          type: string
          nullable: true
          description: Тип активного promotional offer
        will_renew:
          type: boolean
          description: Будет ли уровень доступа автоматически продлён
        is_in_grace_period:
          type: boolean
          description: Находится ли уровень доступа в льготном периоде
        unsubscribed_at:
          type: string
          format: date-time
          nullable: true
          description: Когда пользователь отменил подписку
        billing_issue_detected_at:
          type: string
          format: date-time
          nullable: true
          description: Когда была обнаружена проблема с оплатой
      required:
        - id
        - is_active
        - vendor_product_id
        - store
        - activated_at
        - renewed_at
        - expires_at
        - is_lifetime
        - active_introductory_offer_type
        - active_promotional_offer_type
        - will_renew
        - is_in_grace_period
        - unsubscribed_at
        - billing_issue_detected_at

    SubscriptionObject:
      type: object
      description: |
        Подписка представляет активную покупку подписки. Содержит информацию о
        продукте подписки, деталях покупки и статусе продления.
      properties:
        purchase_id:
          type: string
          format: uuid
          description: Уникальный идентификатор покупки
        store:
          type: string
          description: Стор, в котором была приобретена подписка. Распространённые значения включают app_store, play_store, stripe, paddle или любой пользовательский идентификатор стора
        store_product_id:
          type: string
          description: ID продукта в сторе
        store_base_plan_id:
          type: string
          nullable: true
          description: ID базового плана в сторе
        store_transaction_id:
          type: string
          description: ID транзакции в сторе
        store_original_transaction_id:
          type: string
          description: ID исходной транзакции в сторе
        purchased_at:
          type: string
          format: date-time
          description: Когда была приобретена подписка
        environment:
          type: string
          enum: [Production, Sandbox]
          description: Среда, в которой была совершена покупка
        is_refund:
          type: boolean
          description: Является ли это возвратом средств
        is_consumable:
          type: boolean
          description: Является ли это расходуемой покупкой
      required:
        - purchase_id
        - store
        - store_product_id
        - store_base_plan_id
        - store_transaction_id
        - store_original_transaction_id
        - purchased_at
        - environment
        - is_refund
        - is_consumable

