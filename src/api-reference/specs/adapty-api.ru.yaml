    RefundSaverSettingsObject:
      type: object
      description: |
        Настройки Refund Saver содержат пользовательские предпочтения по обработке запросов на возврат средств.
        Включают согласие на передачу данных и индивидуальные настройки возврата.
      properties:
        consent:
          type: boolean
          description: Определяет, дал ли пользователь согласие на передачу своих данных
        custom_preference:
          type: string
          enum: [grant, no_preference, decline]
          description: Настройка возврата средств
      required:
        - consent
        - custom_preference

    ErrorObject:
      type: object
      description: |
        Ошибка представляет ответ API об ошибке. Содержит информацию о том,
        что пошло не так и как это исправить.
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                nullable: true
                description: Поле или параметр, вызвавший ошибку
              errors:
                type: array
                items:
                  type: string
                description: Массив сообщений об ошибках
            required: [errors]
          description: Массив деталей ошибки
        error_code:
          type: string
          description: Машиночитаемый код ошибки
        status_code:
          type: integer
          description: HTTP-код статуса
      required:
        - errors
        - error_code
        - status_code

    PaginationObject:
      type: object
      description: |
        Метаданные пагинации для эндпоинтов со списками. Содержит информацию о
        текущей странице и общем количестве результатов.
      properties:
        count:
          type: integer
          description: Общее количество элементов
        page:
          type: integer
          description: Номер текущей страницы
        pages:
          type: integer
          description: Общее количество страниц
      required:
        - count
        - page
        - pages