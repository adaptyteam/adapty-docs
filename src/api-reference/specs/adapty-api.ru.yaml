      type: object
      properties:
        custom_preference:
          type: string
          enum: [grant, no_preference, decline]
          nullable: true
          description: |
            Задаёт индивидуальные настройки возврата средств для пользователя.
            - `grant`: одобрять каждый запрос на возврат средств
            - `no_preference`: не давать никаких рекомендаций
            - `decline`: отклонять каждый запрос на возврат средств
        consent:
          type: boolean
          nullable: true
          description: |
            Фиксирует факт предоставления пользователем согласия на передачу данных.
            - `true` означает, что при получении запроса на возврат средств через приложение вы можете предоставить Apple информацию о пользователе
      example:
        custom_preference: "grant"
        consent: true

