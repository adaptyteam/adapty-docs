components:
  securitySchemes:
    apikeyAuth:
      type: apiKey
      name: Authorization
      in: header
      default: Api-Key {Your secret API key}
      description: |
        API istekleri, **Authorization** başlığında gizli API anahtarınızla `Api-Key {your_secret_api_key}` değeriyle kimlik doğrulaması yapılmalıdır; örneğin
        `Api-Key secret_live_...`. Bu anahtarı Adapty Kontrol Paneli -> **Uygulama Ayarları** -> **Genel** sekmesi -> **API anahtarları** bölümünde bulabilirsiniz.
  requestBodies:
    DefaultJson:
      required: true
      content:
        application/json:
          schema:
            type: object
  schemas:
    ProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          nullable: true
          description: Son kullanıcınızın adı
        last_name:
          type: string
          nullable: true
          description: Son kullanıcınızın soyadı
        gender:
          type: string
          nullable: true
          enum: [f, m, o]
          description: Son kullanıcınızın cinsiyeti
        email:
          type: string
          nullable: true
          format: email
          description: Son kullanıcınızın e-postası
        phone_number:
          type: string
          nullable: true
          description: Son kullanıcınızın telefon numarası
        birthday:
          type: string
          format: date
          nullable: true
          description: Son kullanıcınızın doğum günü
        ip_country:
          type: string
          nullable: true
          description: ISO 3166-2 formatında son kullanıcının ülkesi
        ip_v4_address:
          type: string
          nullable: true
          description: Son kullanıcının IPv4 adresi
        store_country:
          type: string
          nullable: true
          description: Son kullanıcının uygulama mağazasının ülkesi
        store:
          type: string
          nullable: true
          enum: [app_store, play_store, stripe]
          description: Kullanıcının uygulamanızda satın alma yapmak için kullandığı platform
        store_account_token:
          type: string
          format: uuid
          nullable: true
          description: Mağaza hesabı token'ı
        att_status:
          type: integer
          nullable: true
          enum: [0, 1, 2, 3]
          description: Apple Uygulama İzleme Şeffaflığı durumu (0=belirlenmedi, 1=kısıtlandı, 2=reddedildi, 3=yetkilendirildi)
        analytics_disabled:
          type: boolean
          nullable: true
          description: Harici analizlerden çıkma seçeneği
        custom_attributes:
          type: array
          items:
            $ref: '#/components/schemas/CustomAttribute'
          description: Profile 30'a kadar özel özellik ayarlanmasına izin verir
        installation_meta:
          $ref: '#/components/schemas/InstallationMeta'
      required:
        - installation_meta
      example:
        first_name: "Jane"
        last_name: "Doe"
        gender: "f"
        email: "jane.doe@example.com"
        phone_number: "+1234567890"
        birthday: "2000-12-31"
        ip_country: "FR"
        ip_v4_address: "192.168.1.1"
        store_country: "US"
        store: "app_store"
        store_account_token: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        att_status: 3
        analytics_disabled: true
        custom_attributes:
          - key: "favourite_sport"
