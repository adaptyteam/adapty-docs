openapi: 3.1.0
info:
  title: Adapty Web API
  version: 1.0.0
  description: |
    La Adapty Web API te permite integrar la plataforma de gestión de suscripciones de Adapty
    en tus aplicaciones web. Esta API proporciona endpoints para obtener paywalls,
    registrar visitas a paywalls y añadir datos de atribución.
servers:
  - url: https://api.adapty.io
    description: Servidor de producción
paths:
  /api/v2/web-api/paywall/:
    post:
      summary: Obtener paywall
      description: Obtiene el paywall del placement indicado.
      operationId: getPaywall
      security:
        - apikeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetPaywallRequest'
            examples:
              basic:
                summary: Solicitud básica de paywall
                value:
                  store: "app_store"
                  locale: "en"
                  placement_id: "PaywallPlacementId"
                  customer_user_id: "user123"
      responses:
        '200':
          description: La respuesta satisfactoria contendrá el objeto Paywall.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaywallResponse'
              examples:
                basic:
                  summary: Basic paywall response
                  value:
                    placement_id: "onboarding"
                    variation_id: "d76feea0-c0cf-4942-bef5-84ed701fc6db"
                    paywall_id: "9a93fe6f-9162-4dc0-b4b7-73079ed95c34"
                    ab_test_name: "1 week + 1 month | apple picture"
                    paywall_name: "1 week + 1 month | apple picture"
                    products:
                      - title: "1 week"
                        is_consumable: false
                        adapty_product_id: "1c3e03e1-9c43-4f94-aeb5-c7ae2f73d0c2"
                        vendor_product_id: "1_week_apple"
                        introductory_offer_eligibility: true
                        promotional_offer_eligibility: true
                        base_plan_id: null
                        offer: null
                      - title: "1 month"
                        is_consumable: false
                        adapty_product_id: "f4088450-45a8-4737-8db0-367e642d7dcb"
                        vendor_product_id: "1_month_apple"
                        introductory_offer_eligibility: true
                        promotional_offer_eligibility: true
                        base_plan_id: null
                        offer: null
                    remote_config:
                      lang: "en"
                      data: "{\"default_product_number\":1,\"features\":[\"#fresh\",\"#green\",\"#healthy1\"],\"soft_paywall\":false,\"image_url\":\"https://adapty.io/apple.png\"}"
        '400':
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariationIdNotFoundError'

  /api/v2/web-api/paywall/visit/:
    post:
      summary: Registrar visita al paywall
      description: |
        Adapty puede ayudarte a medir la conversión de tus paywalls. Sin embargo, para ello
        es necesario que registres cuándo se muestra un paywall — sin eso solo conoceríamos
        a los usuarios que realizaron una compra y perderíamos a aquellos que no lo hicieron.
        Utiliza esta solicitud para registrar una visita al paywall.
      operationId: recordPaywallView
      security:
        - apikeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaywallViewRequest'
            examples:
              basic:
                summary: Registro básico de visita al paywall
                value:
                  visited_at: "2024-08-24T14:15:22Z"
                  store: "app_store"
                  variation_id: "00000000-0000-0000-0000-000000000000"
                  customer_user_id: "user123"
      responses:
        '201':
          description: La visita al paywall se ha registrado correctamente.
          content:
            application/json:
              schema:
                type: object
                description: Cuerpo de respuesta vacío
        '400':
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidDateFormatError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundError'

  /api/v2/web-api/attribution/:
    post:
      summary: Añadir atribución personalizada
      description: Añade datos de atribución de marketing personalizada a un perfil.
      operationId: addAttribution
      security:
        - apikeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAttributionRequest'
            examples:
              basic:
                summary: Datos básicos de atribución
                value:
                  status: "organic"
                  attribution_user_id: "attribution_user_id_value"
                  channel: "marketing_channel_value"
                  campaign: "campaign_name_value"
                  ad_group: "ad_group_name_value"
                  ad_set: "ad_set_name_value"
                  creative: "creative_name_value"
                  customer_user_id: "user123"
      responses:
        '201':
          description: La atribución se ha añadido correctamente al perfil. El cuerpo de la respuesta está vacío.
          content:
            application/json:
              schema:
                type: object
                description: Cuerpo de respuesta vacío
        '400':
          description: Solicitud incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidEnumerationMemberError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileNotFoundError'

components:
  securitySchemes:
    apikeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Las solicitudes a la API deben autenticarse con tu clave API pública en la cabecera **Authorization**
        con el valor `Api-Key {tu_clave_api_publica}`, por ejemplo,
        `Api-Key public_live_...`. Encuentra esta clave en el Adapty Dashboard ->
        **App Settings** -> pestaña **General** -> sección **API keys**.

  schemas:
    GetPaywallRequest:
      type: object
      required:
        - store
        - placement_id
      properties:
        store:
          type: string
          description: |
            Store donde se realizó la compra del producto. Valores posibles: `app_store`, `play_store`, `stripe` o el `Store ID` de tu store personalizado.
          example: "app_store"
        locale:
          type: string
          description: Identificador de la configuración regional del paywall. Se espera que este parámetro sea un código de idioma compuesto por una o más subetiquetas separadas por el carácter "-". La primera subetiqueta corresponde al idioma y la segunda a la región.
          example: "en"
        placement_id:
          type: string
          description: El identificador del placement. Es el valor que especificaste al crear un placement en tu Adapty Dashboard.
          example: "PaywallPlacementId"
        customer_user_id:
          type: string
          description: Se requiere `customer_user_id` o `profile_id`. ID de usuario que utilizas en tu aplicación para identificar al usuario. Por ejemplo, puede ser tu UUID de usuario, correo electrónico o cualquier otro ID.
          example: "user123"
        profile_id:
          type: string
          description: Se requiere `customer_user_id` o `profile_id`. Identificador de un usuario en Adapty.
          example: "3286abd3-48b0-4e9c-a5f6-ac0a006804a6"

    RecordPaywallViewRequest:
      type: object
      required:
        - store
        - variation_id
      properties:
        customer_user_id:
          type: string
          description: Identificador de un usuario en tu sistema. Se requiere `customer_user_id` o `profile_id`.
          example: "user123"
        profile_id:
          type: string
          description: Identificador de un usuario en Adapty. Se requiere `customer_user_id` o `profile_id`.
          example: "3286abd3-48b0-4e9c-a5f6-ac0a006804a6"
        visited_at:
          type: string
          format: date-time
          description: La fecha y hora en que el usuario abrió el paywall.
          example: "2024-08-24T14:15:22Z"
        store:
          type: string
          description: |
            Store donde se realizó la compra del producto. Valores posibles: `app_store`, `play_store`, `stripe` o el `Store ID` de tu store personalizado.
          example: "app_store"
        variation_id:
          type: string
          format: uuid
          description: El ID de variante utilizado para rastrear las compras vinculadas al paywall específico desde el que se realizaron.
          example: "00000000-0000-0000-0000-000000000000"

    AddAttributionRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [organic, non_organic, unknown]
          description: Indica si la atribución es orgánica o no orgánica.
          example: "organic"
        attribution_user_id:
          type: string
          description: ID asignado al usuario por la fuente de atribución.
          example: "attribution_user_id_value"
        channel:
          type: string
          description: Nombre del canal de marketing.
          example: "marketing_channel_value"
        campaign:
          type: string
          description: Nombre de la campaña de marketing.
          example: "campaign_name_value"
        ad_group:
          type: string
          description: Grupo de anuncios de atribución.
          example: "ad_group_name_value"
        ad_set:
          type: string
          description: Conjunto de anuncios de atribución.
          example: "ad_set_name_value"
        creative:
          type: string
          description: Palabra clave del creativo de atribución.
          example: "creative_name_value"
        customer_user_id:
          type: string
          description: ID de usuario que utilizas en tu aplicación para identificar al usuario. Por ejemplo, puede ser tu UUID de usuario, correo electrónico o cualquier otro ID. Nulo si no lo configuraste. Se requiere `customer_user_id` o `profile_id`.
          example: "user123"
        profile_id:
          type: string
          description: Identificador de un usuario en Adapty. Puedes encontrarlo en el campo **Adapty ID** del perfil en el Adapty Dashboard. Se requiere `customer_user_id` o `profile_id`.
          example: "3286abd3-48b0-4e9c-a5f6-ac0a006804a6"

    PaywallResponse:
      type: object
      required:
        - placement_id
        - variation_id
        - paywall_id
        - paywall_name
        - products
      properties:
        placement_id:
          type: string
          description: El ID del placement donde se muestra este paywall. Este valor se establece al crear un placement en tu Adapty Dashboard.
          example: "onboarding"
        variation_id:
          type: string
          format: uuid
          description: El ID de variante utilizado para rastrear las compras vinculadas a este paywall específico.
          example: "d76feea0-c0cf-4942-bef5-84ed701fc6db"
        paywall_id:
          type: string
          format: uuid
          description: El identificador único del paywall.
          example: "9a93fe6f-9162-4dc0-b4b7-73079ed95c34"
        ab_test_name:
          type: string
          description: El nombre de la prueba A/B padre.
          example: "1 week + 1 month | apple picture"
        paywall_name:
          type: string
          description: El nombre del paywall, tal como se define en tu Adapty Dashboard.
          example: "1 week + 1 month | apple picture"
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          description: Array de objetos Product que contienen la información de los productos del paywall.
        remote_config:
          $ref: '#/components/schemas/RemoteConfig'
          description: Un objeto RemoteConfig que contiene el Remote Config completo del paywall.

    Product:
      type: object
      required:
        - is_consumable
        - vendor_product_id
      properties:
        title:
          type: string
          description: Nombre del producto de la sección de productos en el Adapty Dashboard.
        is_consumable:
          type: boolean
          description: Indica si el producto es consumible.
        adapty_product_id:
          type: string
          format: uuid
          description: ID interno del producto tal como se utiliza en Adapty.
        vendor_product_id:
          type: string
          description: El ID del producto en los stores de aplicaciones.
        introductory_offer_eligibility:
          type: boolean
          description: Indica si el usuario es elegible para una oferta introductoria de iOS.
        promotional_offer_eligibility:
          type: boolean
          description: Indica si el usuario es elegible para una oferta promocional.
        base_plan_id:
          type: string
          nullable: true
          description: |
            ID del plan base para Google Play o ID de precio para Stripe.
            Consulta [Base plan ID](https://support.google.com/googleplay/android-developer/answer/12154973) para Google Play o
            [price ID](https://docs.stripe.com/products-prices/how-products-and-prices-work#use-products-and-prices) para Stripe.
        offer:
          allOf:
            - $ref: '#/components/schemas/Offer'
          nullable: true
          description: Un objeto Offer como JSON.

    Offer:
      type: object
      required:
        - category
        - type
      properties:
        category:
          type: string
          enum: [introductory, promotional, offer_code, win_back]
          description: La categoría de la oferta aplicada.
        type:
          type: string
          enum: [free_trial, pay_as_you_go, pay_up_front, unknown]
          description: El tipo de oferta activa. Si este valor no es nulo, significa que la oferta se aplicó en el período de suscripción actual.
        id:
          type: string
          nullable: true
          description: El ID de la oferta aplicada.

    RemoteConfig:
      type: object
      required:
        - lang
        - data
      properties:
        lang:
          type: string
          description: |
            Código de configuración regional para la localización del paywall. Utiliza subetiquetas de idioma y región
            separadas por un guion (-). Ejemplos: `en` para inglés, `pt-br` para portugués de Brasil.
          example: "en"
        data:
          type: string
          description: |
            Cadena JSON serializada que representa el Remote Config de tu paywall.
            Puedes encontrarla en la pestaña Remote Config de un paywall específico en el Adapty Dashboard.

    ParseError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    UnauthorizedError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    VariationIdNotFoundError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    InvalidDateFormatError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    InvalidEnumerationMemberError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

    ProfileNotFoundError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              errors:
                type: array
                items:
                  type: string
        error_code:
          type: string
        status_code:
          type: integer

security:
  - apikeyAuth: []