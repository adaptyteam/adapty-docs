                count:
                  type: integer
                  description: Número total de paywalls
                page:
                  type: integer
                  description: Número de página actual
                pages:
                  type: integer
                  description: Número total de páginas
              required:
                - count
                - page
                - pages
          required:
            - pagination
      required:
        - data
        - meta

    PaywallListItem:
      type: object
      properties:
        title:
          type: string
          description: El nombre del paywall, tal como está definido en tu Adapty Dashboard
        paywall_id:
          type: string
          format: uuid
          description: El identificador único del paywall
        use_paywall_builder:
          type: boolean
          description: Si el paywall utiliza el Paywall Builder
        use_paywall_builder_legacy:
          type: boolean
          description: Si el paywall utiliza el Paywall Builder heredado
        updated_at:
          type: string
          format: date-time
          description: Marca de tiempo de la última actualización del paywall
        created_at:
          type: string
          format: date-time
          description: Marca de tiempo de la creación del paywall
        state:
          type: string
          enum: [draft, live, inactive, archived]
          description: El estado actual del paywall
        is_deleted:
          type: boolean
          description: Si el paywall está marcado como eliminado
        web_purchase_url:
          type: string
          format: uri
          nullable: true
          description: URL para compras web, si corresponde
        products:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
                description: El identificador único del producto
              title:
                type: string
                description: El título del producto
              product_set:
                type: string
                enum: [weekly, monthly, trimonthly, semiannual, annual, lifetime, uncategorised, nonsubscriptions, two_months, consumable]
                description: La categoría del conjunto de productos
              offer:
                type: object
                nullable: true
                properties:
                  product_offer_id:
                    type: string
                    format: uuid
                    description: El identificador único de la oferta de producto
                  title:
                    type: string
                    description: El título de la oferta
                required:
                  - product_offer_id
                  - title
            required:
              - product_id
              - title
              - product_set
              - offer
          description: Array de objetos de producto con información sobre los productos del paywall
      required:
        - title
        - paywall_id
        - use_paywall_builder
        - use_paywall_builder_legacy
        - updated_at
        - created_at
        - state
        - is_deleted
        - products

    ProfileObject:
      type: object
      description: |
        Un perfil representa a un usuario final de tu app. Contiene todos los datos de suscripción del usuario,
        el historial de compras y los atributos personalizados. Los perfiles se identifican mediante un customer_user_id
        (tu ID de usuario interno) o un profile_id (el ID interno de Adapty).
      properties:
        app_id:
          type: string
          format: uuid
          description: El identificador único de tu app en Adapty
        profile_id:
          type: string
          format: uuid
          description: El identificador único del perfil en Adapty
        customer_user_id:
          type: string
          nullable: true
          description: El ID de tu usuario en tu sistema
        total_revenue_usd:
          type: number
          format: float
          description: Ingresos totales generados por este usuario en USD
        segment_hash:
          type: string
          description: Hash del segmento del usuario para análisis
        timestamp:
          type: integer
          format: int64
          description: Marca de tiempo Unix de la última actualización del perfil
        custom_attributes:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: La clave del atributo
              value:
                type: string
                description: El valor del atributo
            required: [key, value]
          description: Array de atributos personalizados del usuario
        access_levels:
          type: array
          items:
            $ref: '#/components/schemas/AccessLevelObject'
          description: Array de niveles de acceso que tiene el usuario
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionObject'
          description: Array de suscripciones activas
        non_subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/NonSubscriptionObject'
          description: Array de compras únicas
      required:
        - app_id
        - profile_id
        - customer_user_id
        - total_revenue_usd
        - segment_hash
        - timestamp
        - custom_attributes
        - access_levels
        - subscriptions
        - non_subscriptions

    AccessLevelObject:
      type: object
      description: |
        Un nivel de acceso representa una funcionalidad o nivel de contenido de pago en tu app.
        Los usuarios pueden tener múltiples niveles de acceso, y cada nivel puede tener diferentes fechas de expiración.
      properties:
        id:
          type: string
          description: El identificador único del nivel de acceso
        is_active:
          type: boolean
          description: Si el nivel de acceso está activo actualmente
        vendor_product_id:
          type: string
          description: El ID del producto en el store de apps
        store:
          type: string
          description: El store donde se adquirió el nivel de acceso. Los valores habituales son app_store, play_store, stripe, paddle o cualquier identificador de store personalizado
        activated_at:
          type: string
          format: date-time
          description: Cuándo se activó el nivel de acceso
        renewed_at:
          type: string
          format: date-time
          nullable: true
          description: Cuándo se renovó por última vez el nivel de acceso
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Cuándo expira el nivel de acceso (null para acceso de por vida)
        is_lifetime:
          type: boolean
          description: Si se trata de un nivel de acceso de por vida
        active_introductory_offer_type:
          type: string
          nullable: true
          description: Tipo de oferta introductoria activa
        active_promotional_offer_type:
          type: string
          nullable: true
          description: Tipo de oferta promocional activa
        will_renew:
          type: boolean
          description: Si el nivel de acceso se renovará automáticamente
        is_in_grace_period:
          type: boolean
          description: Si el nivel de acceso está en período de gracia
        unsubscribed_at:
          type: string
          format: date-time
          nullable: true
          description: Cuándo se dio de baja el usuario
        billing_issue_detected_at:
          type: string
          format: date-time
          nullable: true
          description: Cuándo se detectó un problema de facturación
      required:
        - id
        - is_active
        - vendor_product_id
        - store
        - activated_at
        - renewed_at
        - expires_at
        - is_lifetime
        - active_introductory_offer_type
        - active_promotional_offer_type
        - will_renew
        - is_in_grace_period
        - unsubscribed_at
        - billing_issue_detected_at

    SubscriptionObject:
      type: object
      description: |
        Una suscripción representa una compra de suscripción activa. Contiene información sobre
        el producto de suscripción, los detalles de la compra y el estado de renovación.
      properties:
        purchase_id:
          type: string
          format: uuid
          description: El identificador único de la compra
        store:
          type: string
          description: El store donde se adquirió la suscripción. Los valores habituales son app_store, play_store, stripe, paddle o cualquier identificador de store personalizado
        store_product_id:
          type: string
          description: El ID del producto en el store
        store_base_plan_id:
          type: string
          nullable: true
          description: El ID del plan base en el store
        store_transaction_id:
          type: string
          description: El ID de la transacción en el store
        store_original_transaction_id:
          type: string
          description: El ID de la transacción original en el store
        purchased_at:
          type: string
          format: date-time
          description: Cuándo se adquirió la suscripción
        environment:
          type: string
          enum: [Production, Sandbox]
          description: El entorno donde se realizó la compra
        is_refund:
          type: boolean
          description: Si se trata de una compra reembolsada
        is_consumable:
          type: boolean
          description: Si se trata de una compra consumible
      required:
        - purchase_id
        - store
        - store_product_id
        - store_base_plan_id
        - store_transaction_id
        - store_original_transaction_id
        - purchased_at
        - environment
        - is_refund
        - is_consumable

    NonSubscriptionObject:
      type: object
      description: |
        Una compra no suscrita representa una compra única. Contiene información sobre
        el producto y los detalles de la compra.
      properties:
        purchase_id:
          type: string
          format: uuid
          description: El identificador único de la compra
        store:
          type: string
          description: El store donde se realizó la compra. Los valores habituales son app_store, play_store, stripe, paddle o cualquier identificador de store personalizado
        store_product_id:
          type: string
          description: El ID del producto en el store
        store_transaction_id:
          type: string
          description: El ID de la transacción en el store
        purchased_at:
          type: string
          format: date-time
          description: Cuándo se realizó la compra
        environment:
          type: string
          enum: [Production, Sandbox]
          description: El entorno donde se realizó la compra
        is_refund:
          type: boolean
          description: Si se trata de una compra reembolsada
        is_consumable:
          type: boolean
          description: Si se trata de una compra consumible
      required:
        - purchase_id
        - store
        - store_product_id
        - store_transaction_id
        - purchased_at
        - environment
        - is_refund
        - is_consumable

    PaywallObject:
      type: object
      description: |
        Un paywall representa una pantalla de monetización en tu app. Contiene información sobre
        la configuración del paywall, los productos y los Remote Configs.
      properties:
        title:
          type: string
          description: El nombre del paywall, tal como está definido en tu Adapty Dashboard
        paywall_id:
          type: string
          format: uuid
          description: El identificador único del paywall
        use_paywall_builder:
          type: boolean
          description: Si el paywall utiliza el Paywall Builder
        use_paywall_builder_legacy:
          type: boolean
          description: Si el paywall utiliza el Paywall Builder heredado
        updated_at:
          type: string
          format: date-time
          description: Marca de tiempo de la última actualización del paywall
        created_at:
          type: string
          format: date-time
          description: Marca de tiempo de la creación del paywall
        state:
          type: string
          enum: [draft, live, inactive, archived]
          description: El estado actual del paywall
        is_deleted:
          type: boolean
          description: Si el paywall está marcado como eliminado
        web_purchase_url:
          type: string
          format: uri
          nullable: true
          description: URL para compras web, si corresponde
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductObject'
          description: Array de productos disponibles en este paywall
        remote_configs:
          type: array
          items:
            $ref: '#/components/schemas/RemoteConfigObject'
          description: Array de Remote Configs para diferentes configuraciones regionales
        main_screenshot:
          type: object
          nullable: true
          properties:
            image_id:
              type: integer
              description: El identificador único de la imagen
            url:
              type: string
              format: uri
              description: La URL de la imagen
          required: [image_id, url]
          description: Objeto de captura de pantalla principal con image_id y url
      required:
        - title
        - paywall_id
        - use_paywall_builder
        - use_paywall_builder_legacy
        - updated_at
        - created_at
        - state
        - is_deleted
        - products

    ProductObject:
      type: object
      description: |
        Un producto representa un artículo comprable en tu app. Puede ser una suscripción
        o un producto de compra única.
      properties:
        product_id:
          type: string
          format: uuid
          description: El identificador único del producto
        title:
          type: string
          description: El título del producto
        product_set:
          type: string
          description: La categoría del conjunto de productos
        offer:
          type: object
          nullable: true
          properties:
            product_offer_id:
              type: string
              format: uuid
              description: El identificador único de la oferta de producto
            title:
              type: string
              description: El título de la oferta
          required: [product_offer_id, title]
          description: Información sobre la oferta del producto
      required:
        - product_id
        - title
        - product_set
        - offer

    RemoteConfigObject:
      type: object
      description: |
        Un Remote Config contiene datos de configuración específicos de una configuración regional para un paywall.
        Esto permite personalizar la apariencia y el comportamiento del paywall para diferentes idiomas.
      properties:
        locale:
          type: string
          description: La configuración regional del Remote Config (p. ej., "en", "es", "fr")
        data:
          type: string
          description: Cadena JSON que contiene los datos del Remote Config
      required:
        - locale
        - data

    IntegrationIdentifiersObject:
      type: object
      description: |
        Los identificadores de integración contienen los ID de usuario de varios servicios de terceros.
        Se utilizan para sincronizar los datos de usuario en diferentes plataformas de análisis y marketing.
      properties:
        adjust_device_id:
          type: string
          nullable: true
          description: El ID de usuario de red en la integración de Adjust
        airbridge_device_id:
          type: string
          nullable: true
          description: El ID del dispositivo del usuario en la integración de Airbridge
        amplitude_device_id:
          type: string
          nullable: true
          description: El ID del dispositivo del usuario en la integración de Amplitude
        amplitude_user_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de Amplitude
        appmetrica_device_id:
          type: string
          nullable: true
          description: El ID del dispositivo del usuario en la integración de AppMetrica
        appmetrica_profile_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de AppMetrica
        appsflyer_id:
          type: string
          nullable: true
          description: El ID de usuario de red en la integración de AppsFlyer
        branch_id:
          type: string
          nullable: true
          description: La Branch Key de la app del usuario en la integración de Branch
        facebook_anonymous_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de Facebook Ads
        firebase_app_instance_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de Firebase
        mixpanel_user_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de Mixpanel
        one_signal_player_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de OneSignal (identificador heredado)
        one_signal_subscription_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de OneSignal (identificador recomendado)
        posthog_distinct_user_id:
          type: string
          nullable: true
          description: El ID del usuario en la integración de PostHog
        pushwoosh_hwid:
          type: string
          nullable: true
          description: El ID del dispositivo del usuario en la integración de Pushwoosh
        tenjin_analytics_installation_id:
          type: string
          nullable: true
          description: El ID del dispositivo del usuario en la integración de Tenjin

    RefundSaverSettingsObject:
      type: object
      description: |
        La configuración de Refund Saver contiene las preferencias del usuario para gestionar las solicitudes de reembolso.
        Incluye el consentimiento para compartir datos y las preferencias de reembolso personalizadas.
      properties:
        consent:
          type: boolean
          description: Define si el usuario consintió compartir sus datos
        custom_preference:
          type: string
          enum: [grant, no_preference, decline]
          description: La preferencia de reembolso
      required:
        - consent
        - custom_preference

    ErrorObject:
      type: object
      description: |
        Un error representa una respuesta de error de la API. Contiene información sobre
        qué salió mal y cómo solucionarlo.
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
                nullable: true
                description: El campo o parámetro que causó el error
              errors:
                type: array
                items:
                  type: string
                description: Array de mensajes de error
            required: [errors]
          description: Array de detalles del error
        error_code:
          type: string
          description: Un código de error legible por máquina
        status_code:
          type: integer
          description: El código de estado HTTP
      required:
        - errors
        - error_code
        - status_code

    PaginationObject:
      type: object
      description: |
        Metadatos de paginación para los endpoints de listado. Contiene información sobre
        la página actual y el total de resultados.
      properties:
        count:
          type: integer
          description: Número total de elementos
        page:
          type: integer
          description: Número de página actual
        pages:
          type: integer
          description: Número total de páginas
      required:
        - count
        - page
        - pages