components:
  securitySchemes:
    apikeyAuth:
      type: apiKey
      name: Authorization
      in: header
      default: Api-Key {Your secret API key}
      description: |
        Las solicitudes a la API deben autenticarse con tu clave API secreta en la cabecera **Authorization**
        con el valor `Api-Key {your_secret_api_key}`, por ejemplo,
        `Api-Key secret_live_...`. Puedes encontrar esta clave en el Adapty Dashboard ->
        **App Settings** -> pestaña **General** -> sección **API keys**.
  requestBodies:
    DefaultJson:
      required: true
      content:
        application/json:
          schema:
            type: object
  schemas:
    ProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          nullable: true
          description: Nombre de tu usuario final
        last_name:
          type: string
          nullable: true
          description: Apellido de tu usuario final
        gender:
          type: string
          nullable: true
          enum: [f, m, o]
          description: Género de tu usuario final
        email:
          type: string
          nullable: true
          format: email
          description: Correo electrónico de tu usuario final
        phone_number:
          type: string
          nullable: true
          description: Número de teléfono de tu usuario final
        birthday:
          type: string
          format: date
          nullable: true
          description: Fecha de nacimiento de tu usuario final
        ip_country:
          type: string
          nullable: true
          description: País del usuario final en formato ISO 3166-2
        ip_v4_address:
          type: string
          nullable: true
          description: Dirección IPv4 del usuario final
        store_country:
          type: string
          nullable: true
          description: País del store del usuario final
        store:
          type: string
          nullable: true
          enum: [app_store, play_store, stripe, adapty, paddle]
          description: La plataforma que el usuario utiliza para realizar compras in-app en tu app
        store_account_token:
          type: string
          format: uuid
          nullable: true
          description: Token de cuenta del store
        att_status:
          type: integer
          nullable: true
          enum: [0, 1, 2, 3]
          description: Estado de Apple App Tracking Transparency (0=no determinado, 1=restringido, 2=denegado, 3=autorizado)
        analytics_disabled:
          type: boolean
          nullable: true
          description: Opción para darse de baja de los análisis externos
        custom_attributes:
          type: array
          items:
            $ref: '#/components/schemas/CustomAttribute'
          description: Permite establecer hasta 30 atributos personalizados para el perfil
        installation_meta:
          $ref: '#/components/schemas/InstallationMeta'
      required:
        - installation_meta
      example:
        first_name: "Jane"
        last_name: "Doe"
        gender: "f"
        email: "jane.doe@example.com"
        phone_number: "+1234567890"
        birthday: "2000-12-31"
        ip_country: "FR"
        ip_v4_address: "192.168.1.1"
        store_country: "US"
        store: "app_store"
        store_account_token: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        att_status: 3
        analytics_disabled: true
        custom_attributes:
          - key: "favourite_sport"
            value: "yoga"
        installation_meta:
          device_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
          device: "iPhone 15 Pro"
          locale: "en"
          os: "iOS 17.1"
          platform: "iOS"
          timezone: "Europe/Rome"
          user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 17_1_1 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.1 Mobile/15E148 Safari/604.1"
          app_build: "1.0.0"
          app_version: "1.0.0"
          adapty_sdk_version: "2.0.0"
          idfa: "EA7583CD-A667-48BC-B806-42ECB2B48333"
          idfv: "E9D48DA5-3930-4B41-8521-D953AECD2F33"
          advertising_id: ""
          android_id: ""
          android_app_set_id: ""

    ProfileResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Profile'
      required:
        - data

    Profile:
      type: object
      properties:
        app_id:
          type: string
          format: uuid
          description: El ID interno de tu app
        profile_id:
          type: string
          format: uuid
          description: ID de perfil de Adapty
        customer_user_id:
          type: string
          nullable: true
          description: El ID de tu usuario en tu sistema
        total_revenue_usd:
          type: number
          format: float
          description: Un valor decimal que representa los ingresos totales en USD generados por el perfil
        segment_hash:
          type: string
          description: Parámetro interno
        timestamp:
          type: integer
          format: int64
          description: Hora de la respuesta en milisegundos; necesario para resolver una condición de carrera
        custom_attributes:
          type: array
          items:
            $ref: '#/components/schemas/CustomAttribute'
          description: Se permite un máximo de 30 atributos personalizados por perfil
        access_levels:
          type: array
          items:
            $ref: '#/components/schemas/AccessLevel'
          description: Array de objetos de nivel de acceso. Array vacío si el cliente no tiene niveles de acceso
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
          description: Array de objetos de suscripción. Array vacío si el cliente no tiene suscripciones
        non_subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/NonSubscription'
          description: Array de objetos de compras no suscritas. Array vacío si el cliente no tiene compras
      required:
        - app_id
        - profile_id
        - customer_user_id
        - total_revenue_usd
        - segment_hash
        - timestamp
        - custom_attributes
        - access_levels
        - subscriptions
        - non_subscriptions

    CustomAttribute:
      type: object
      properties:
        key:
          type: string
          maxLength: 30
          description: La clave debe ser una cadena de texto de no más de 30 caracteres. Solo se permiten letras, números, guiones, puntos y guiones bajos
        value:
          oneOf:
            - type: string
            - type: number
          description: El valor del atributo no debe superar los 50 caracteres. Solo se permiten cadenas de texto y números decimales como valores
      required:
        - key
        - value

    InstallationMeta:
      type: object
      properties:
        device_id:
          type: string
          format: uuid
          description: Identificador único del dispositivo
        device:
          type: string
          nullable: true
          description: Información del dispositivo
        locale:
          type: string
